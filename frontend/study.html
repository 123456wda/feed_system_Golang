<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Go Feed 系统 学习工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Design Tokens
   ============================================================ */
:root {
  /* Shared palette */
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --accent-light: #e0e7ff;
  --accent-dark: #3730a3;
  --green: #22c55e;
  --green-light: #dcfce7;
  --green-dark: #15803d;
  --blue: #3b82f6;
  --blue-light: #dbeafe;
  --blue-dark: #1d4ed8;
  --orange: #f59e0b;
  --orange-light: #fef3c7;
  --orange-dark: #b45309;
  --red: #ef4444;
  --red-light: #fee2e2;
  --zinc-50: #fafafa;
  --zinc-100: #f4f4f5;
  --zinc-200: #e4e4e7;
  --zinc-300: #d4d4d8;
  --zinc-400: #a1a1aa;
  --zinc-500: #71717a;
  --zinc-600: #52525b;
  --zinc-700: #3f3f46;
  --zinc-800: #27272a;
  --zinc-900: #18181b;
  --zinc-950: #09090b;
  /* Layout */
  --topnav-h: 56px;
  --sidebar-w: 280px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
  --transition-fast: .15s ease;
  --transition-base: .25s ease;
  --transition-slow: .4s cubic-bezier(.4,0,.2,1);
  /* Typography */
  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
}

/* Light theme tokens */
[data-theme="light"] {
  --bg-page: var(--zinc-50);
  --bg-surface: #ffffff;
  --bg-surface-alt: var(--zinc-100);
  --bg-elevated: #ffffff;
  --bg-inset: var(--zinc-100);
  --border-color: var(--zinc-200);
  --border-color-strong: var(--zinc-300);
  --text-primary: var(--zinc-900);
  --text-secondary: var(--zinc-600);
  --text-tertiary: var(--zinc-400);
  --text-inverse: #ffffff;
  --topnav-bg: rgba(255,255,255,.82);
  --sidebar-bg: #ffffff;
  --card-bg: #ffffff;
  --card-border: var(--zinc-200);
  --code-bg: var(--zinc-100);
  --hover-bg: var(--zinc-100);
  --scrollbar-track: var(--zinc-100);
  --scrollbar-thumb: var(--zinc-300);
  --scrollbar-thumb-hover: var(--zinc-400);
  --noise-opacity: .03;
  --overlay-bg: rgba(0,0,0,.4);
}

/* Dark theme tokens */
[data-theme="dark"] {
  --bg-page: var(--zinc-950);
  --bg-surface: var(--zinc-900);
  --bg-surface-alt: var(--zinc-800);
  --bg-elevated: var(--zinc-800);
  --bg-inset: var(--zinc-950);
  --border-color: var(--zinc-800);
  --border-color-strong: var(--zinc-700);
  --text-primary: var(--zinc-100);
  --text-secondary: var(--zinc-400);
  --text-tertiary: var(--zinc-500);
  --text-inverse: var(--zinc-900);
  --topnav-bg: rgba(9,9,11,.85);
  --sidebar-bg: var(--zinc-900);
  --card-bg: var(--zinc-900);
  --card-border: var(--zinc-800);
  --code-bg: var(--zinc-950);
  --hover-bg: var(--zinc-800);
  --scrollbar-track: var(--zinc-900);
  --scrollbar-thumb: var(--zinc-700);
  --scrollbar-thumb-hover: var(--zinc-600);
  --noise-opacity: .04;
  --overlay-bg: rgba(0,0,0,.6);
  --accent-light: var(--zinc-800);
  --green-light: rgba(34,197,94,.12);
  --blue-light: rgba(59,130,246,.12);
  --orange-light: rgba(245,158,11,.12);
  --red-light: rgba(239,68,68,.12);
}

/* ============================================================
   Reset + Base
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  scroll-behavior:smooth;
}
body{
  font-family:var(--font-sans);
  background:var(--bg-page);
  color:var(--text-primary);
  line-height:1.65;
  min-height:100vh;
  transition:background var(--transition-base),color var(--transition-base);
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:inherit}
ul,ol{list-style:none}
h1,h2,h3,h4,h5,h6{font-weight:600;line-height:1.3}
code{font-family:var(--font-mono)}

/* Noise texture overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:var(--noise-opacity);
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;
  background-size:200px 200px;
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--scrollbar-track)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:var(--radius-full)}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover)}
*{scrollbar-width:thin;scrollbar-color:var(--scrollbar-thumb) var(--scrollbar-track)}

/* ============================================================
   Topnav
   ============================================================ */
.topnav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:12px;
  height:var(--topnav-h);
  padding:0 20px;
  background:var(--topnav-bg);
  backdrop-filter:blur(16px) saturate(1.4);
  -webkit-backdrop-filter:blur(16px) saturate(1.4);
  border-bottom:1px solid var(--border-color);
  transition:background var(--transition-base),border-color var(--transition-base);
}
.brand{
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
  font-weight:700;font-size:15px;
  white-space:nowrap;
  user-select:none;
}
.brand-icon{
  display:flex;align-items:center;justify-content:center;
  width:30px;height:30px;
  background:var(--accent);
  color:#fff;
  font-family:var(--font-mono);font-weight:700;font-size:14px;
  border-radius:var(--radius-sm);
  flex-shrink:0;
}
.brand-title{
  color:var(--text-primary);
  transition:color var(--transition-base);
}
.brand-sub{
  color:var(--text-tertiary);
  font-weight:400;font-size:12px;
  margin-left:-4px;
}
.mode-tabs{
  display:flex;align-items:center;
  gap:2px;
  background:var(--bg-inset);
  border-radius:var(--radius-full);
  padding:3px;
  flex-shrink:0;
  transition:background var(--transition-base);
}
.mode-tab{
  padding:5px 14px;
  font-size:13px;font-weight:500;
  border-radius:var(--radius-full);
  white-space:nowrap;
  transition:all var(--transition-fast);
  color:var(--text-secondary);
}
.mode-tab:hover{color:var(--text-primary);background:var(--hover-bg)}
.mode-tab.active{
  background:var(--accent);
  color:#fff;
  box-shadow:0 1px 4px rgba(99,102,241,.35);
}

.search-wrap{
  position:relative;
  flex:1;max-width:320px;min-width:120px;
  margin-left:8px;
}
.search-wrap input{
  width:100%;
  padding:7px 12px 7px 34px;
  font-size:13px;
  background:var(--bg-inset);
  border:1px solid var(--border-color);
  border-radius:var(--radius-full);
  outline:none;
  transition:all var(--transition-fast);
}
.search-wrap input::placeholder{color:var(--text-tertiary)}
.search-wrap input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,.15);
  background:var(--bg-surface);
}
.search-wrap .search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text-tertiary);font-size:14px;pointer-events:none;
}

.nav-spacer{flex:1}

.theme-btn{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;
  border-radius:var(--radius-full);
  background:var(--bg-inset);
  border:1px solid var(--border-color);
  font-size:16px;
  transition:all var(--transition-fast);
  flex-shrink:0;
}
.theme-btn:hover{border-color:var(--accent);background:var(--accent-light)}
#themeIcon{transition:transform var(--transition-base)}

.progress-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;
  background:var(--green-light);
  color:var(--green-dark);
  font-size:12px;font-weight:600;
  border-radius:var(--radius-full);
  flex-shrink:0;
  white-space:nowrap;
  transition:all var(--transition-base);
}
.progress-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ============================================================
   App Layout
   ============================================================ */
.app{
  display:flex;
  min-height:calc(100vh - var(--topnav-h));
}

/* ============================================================
   Sidebar
   ============================================================ */
.sidebar{
  position:sticky;top:var(--topnav-h);
  align-self:flex-start;
  width:var(--sidebar-w);
  height:calc(100vh - var(--topnav-h));
  overflow-y:auto;
  padding:16px 0;
  background:var(--sidebar-bg);
  border-right:1px solid var(--border-color);
  flex-shrink:0;
  transition:background var(--transition-base),border-color var(--transition-base);
}
.sidebar-section{
  margin-bottom:4px;
}
.ch-group-title{
  display:flex;align-items:center;gap:8px;
  padding:8px 20px 6px;
  font-size:11px;font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--text-tertiary);
}
.ch-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 20px;
  font-size:13px;font-weight:500;
  color:var(--text-secondary);
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all var(--transition-fast);
}
.ch-item:hover{background:var(--hover-bg);color:var(--text-primary)}
.ch-item.active{
  color:var(--accent);
  background:var(--accent-light);
  border-left-color:var(--accent);
}
.ch-item .ch-badge{
  margin-left:auto;
  min-width:22px;height:18px;
  display:flex;align-items:center;justify-content:center;
  padding:0 5px;
  font-size:10px;font-weight:700;
  border-radius:var(--radius-full);
  background:var(--bg-inset);
  color:var(--text-tertiary);
  transition:all var(--transition-fast);
}
.ch-item.active .ch-badge{background:var(--accent);color:#fff}

.sub-item{
  display:block;
  padding:5px 20px 5px 38px;
  font-size:12.5px;
  color:var(--text-tertiary);
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all var(--transition-fast);
}
.sub-item:hover{color:var(--text-secondary);background:var(--hover-bg)}
.sub-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-light)}

.ch-progress{
  margin:6px 20px 10px;
  height:3px;
  background:var(--bg-inset);
  border-radius:var(--radius-full);
  overflow:hidden;
}
.ch-progress-bar{
  height:100%;
  background:var(--accent);
  border-radius:var(--radius-full);
  transition:width var(--transition-slow);
}

/* ============================================================
   Main Content
   ============================================================ */
.main{
  flex:1;
  min-width:0;
  padding:28px 32px 60px;
  overflow-y:auto;
  max-height:calc(100vh - var(--topnav-h));
}

.section-card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--radius-lg);
  padding:28px 30px;
  margin-bottom:24px;
  transition:border-color var(--transition-base),background var(--transition-base),box-shadow var(--transition-base);
}
.section-card:hover{box-shadow:var(--shadow-md)}
.section-card h2{
  font-size:20px;
  margin-bottom:6px;
  display:flex;align-items:center;gap:10px;
}
.section-card h2 .sec-badge{
  display:inline-flex;align-items:center;justify-content:center;
  padding:2px 8px;
  font-size:11px;font-weight:600;
  border-radius:var(--radius-full);
  background:var(--accent-light);
  color:var(--accent);
}
.section-card h3{font-size:16px;margin:20px 0 8px;color:var(--text-primary)}
.section-card p{font-size:14.5px;color:var(--text-secondary);margin-bottom:12px;line-height:1.75}
.section-card ul,.section-card ol{
  padding-left:22px;margin-bottom:12px;
  list-style:disc;
  font-size:14px;color:var(--text-secondary);
}
.section-card ol{list-style:decimal}
.section-card li{margin-bottom:5px;line-height:1.65}
.section-card li::marker{color:var(--accent)}

/* Code blocks */
.code-block{
  position:relative;
  background:var(--code-bg);
  border:1px solid var(--border-color);
  border-radius:var(--radius-md);
  padding:16px 20px;
  margin:12px 0;
  overflow-x:auto;
  font-family:var(--font-mono);
  font-size:13px;
  line-height:1.7;
  color:var(--text-primary);
  transition:background var(--transition-base),border-color var(--transition-base);
}
.code-block .kw{color:#8b5cf6;font-weight:600}
.code-block .str{color:#22c55e}
.code-block .cm{color:var(--text-tertiary);font-style:italic}
.code-block .fn{color:#3b82f6}
.code-block .num{color:#f59e0b}
.code-label{
  position:absolute;top:8px;right:12px;
  font-size:10px;font-weight:600;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:.05em;
}

/* ============================================================
   Lv1 / Lv2 / Lv3 Accordion
   ============================================================ */
.lv-block{
  border-radius:var(--radius-md);
  margin:14px 0;
  border:1px solid var(--border-color);
  overflow:hidden;
  transition:border-color var(--transition-base);
}
.lv-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  cursor:pointer;
  font-size:14px;font-weight:600;
  user-select:none;
  transition:background var(--transition-fast);
}
.lv-header:hover{background:var(--hover-bg)}
.lv-header .lv-arrow{
  display:inline-flex;
  width:18px;height:18px;
  align-items:center;justify-content:center;
  font-size:11px;
  color:var(--text-tertiary);
  transition:transform var(--transition-base);
  flex-shrink:0;
}
.lv-block.open > .lv-header .lv-arrow{transform:rotate(90deg)}
.lv-header .lv-tag{
  font-size:10px;font-weight:700;
  padding:2px 7px;
  border-radius:var(--radius-sm);
  text-transform:uppercase;
  letter-spacing:.04em;
  flex-shrink:0;
}
.lv-body{
  max-height:0;
  overflow:hidden;
  transition:max-height var(--transition-slow),padding var(--transition-base);
  padding:0 16px;
}
.lv-block.open > .lv-body{
  max-height:2000px;
  padding:4px 16px 16px;
}

/* Level colours */
.lv-block.lv1{border-left:3px solid var(--green)}
.lv-block.lv1 .lv-header{border-bottom:1px solid var(--green-light)}
.lv-block.lv1 .lv-tag{background:var(--green-light);color:var(--green-dark)}
.lv-block.lv1.open{border-color:var(--green)}

.lv-block.lv2{border-left:3px solid var(--blue)}
.lv-block.lv2 .lv-header{border-bottom:1px solid var(--blue-light)}
.lv-block.lv2 .lv-tag{background:var(--blue-light);color:var(--blue-dark)}
.lv-block.lv2.open{border-color:var(--blue)}

.lv-block.lv3{border-left:3px solid var(--orange)}
.lv-block.lv3 .lv-header{border-bottom:1px solid var(--orange-light)}
.lv-block.lv3 .lv-tag{background:var(--orange-light);color:var(--orange-dark)}
.lv-block.lv3.open{border-color:var(--orange)}

/* ============================================================
   Quiz Section
   ============================================================ */
.quiz-section{
  margin:20px 0;
}
.quiz-item{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--radius-md);
  margin-bottom:10px;
  overflow:hidden;
  transition:all var(--transition-fast);
}
.quiz-item:hover{border-color:var(--accent)}
.quiz-q{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  cursor:pointer;
  font-size:14px;font-weight:500;
  transition:background var(--transition-fast);
}
.quiz-q:hover{background:var(--hover-bg)}
.quiz-q .q-icon{
  display:flex;align-items:center;justify-content:center;
  width:24px;height:24px;
  border-radius:var(--radius-full);
  background:var(--accent-light);
  color:var(--accent);
  font-size:12px;font-weight:700;
  flex-shrink:0;
}
.quiz-q .q-arrow{
  margin-left:auto;
  font-size:12px;color:var(--text-tertiary);
  transition:transform var(--transition-base);
}
.quiz-item.open > .quiz-q .q-arrow{transform:rotate(180deg)}
.quiz-a{
  max-height:0;
  overflow:hidden;
  transition:max-height var(--transition-slow);
}
.quiz-item.open > .quiz-a{max-height:1000px}
.quiz-a-inner{
  padding:0 16px 14px 50px;
  font-size:13.5px;
  color:var(--text-secondary);
  line-height:1.7;
}
.quiz-btns{
  display:flex;gap:8px;
  margin-top:10px;
}
.quiz-btn{
  padding:5px 14px;
  font-size:12px;font-weight:600;
  border-radius:var(--radius-full);
  border:1px solid;
  transition:all var(--transition-fast);
}
.quiz-btn.mastered{
  border-color:var(--green);color:var(--green);
  background:var(--green-light);
}
.quiz-btn.mastered:hover{background:var(--green);color:#fff}
.quiz-btn.unmastered{
  border-color:var(--red);color:var(--red);
  background:var(--red-light);
}
.quiz-btn.unmastered:hover{background:var(--red);color:#fff}
.quiz-item.mastered-card{opacity:.55}
.quiz-item.mastered-card .quiz-q{text-decoration:line-through}

/* ============================================================
   Interview Flip Cards
   ============================================================ */
.interview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
  margin:16px 0;
}
.flip-card{
  perspective:800px;
  height:200px;
  cursor:pointer;
}
.flip-inner{
  position:relative;
  width:100%;height:100%;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:var(--radius-md);
  border:1px solid var(--card-border);
  padding:20px;
  display:flex;flex-direction:column;justify-content:center;
  transition:border-color var(--transition-base),background var(--transition-base);
}
.flip-front{
  background:var(--card-bg);
}
.flip-front h4{
  font-size:14px;margin-bottom:8px;
  color:var(--accent);
}
.flip-front p{
  font-size:13.5px;color:var(--text-secondary);line-height:1.65;
}
.flip-front .flip-hint{
  margin-top:auto;
  font-size:11px;color:var(--text-tertiary);
  display:flex;align-items:center;gap:4px;
}
.flip-back{
  background:var(--accent-light);
  transform:rotateY(180deg);
  font-size:13px;
  color:var(--text-primary);
  line-height:1.7;
  overflow-y:auto;
}

/* ============================================================
   Scenario Cards
   ============================================================ */
.scenario-flow{
  display:flex;flex-direction:column;gap:0;
  margin:16px 0;
  position:relative;
}
.flow-step{
  display:flex;gap:16px;
  position:relative;
}
.flow-connector{
  display:flex;flex-direction:column;align-items:center;
  width:36px;flex-shrink:0;
}
.flow-num{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  background:var(--accent);
  color:#fff;
  font-size:13px;font-weight:700;
  border-radius:50%;
  flex-shrink:0;
  z-index:1;
  box-shadow:0 0 0 3px var(--bg-page);
  transition:background var(--transition-base);
}
.flow-line{
  flex:1;
  width:2px;
  background:var(--border-color-strong);
  min-height:20px;
  transition:background var(--transition-base);
}
.flow-step:last-child .flow-line{display:none}
.flow-content{
  flex:1;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--radius-md);
  padding:14px 18px;
  margin-bottom:12px;
  transition:all var(--transition-fast);
}
.flow-content:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.flow-content h4{font-size:14px;margin-bottom:4px}
.flow-content p{font-size:13px;color:var(--text-secondary);line-height:1.6}

/* Fault tree cards */
.fault-tree{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
  margin:16px 0;
}
.fault-card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--radius-md);
  padding:16px;
  border-left:4px solid var(--red);
  transition:all var(--transition-fast);
}
.fault-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.fault-card h4{
  font-size:13px;
  color:var(--red);
  margin-bottom:6px;
  display:flex;align-items:center;gap:6px;
}
.fault-card h4::before{content:'';font-size:14px}
.fault-card p{font-size:12.5px;color:var(--text-secondary);line-height:1.6}
.fault-card .fault-fix{
  margin-top:8px;
  padding:8px 10px;
  background:var(--green-light);
  border-radius:var(--radius-sm);
  font-size:12px;
  color:var(--green-dark);
}

/* ============================================================
   Toolbar & Timer
   ============================================================ */
.toolbar{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;
  margin-bottom:12px;
  flex-wrap:wrap;
}
.toolbar-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 12px;
  font-size:12.5px;font-weight:500;
  background:var(--bg-inset);
  border:1px solid var(--border-color);
  border-radius:var(--radius-sm);
  transition:all var(--transition-fast);
}
.toolbar-btn:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.toolbar-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.timer{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;
  background:var(--bg-inset);
  border:1px solid var(--border-color);
  border-radius:var(--radius-full);
  font-family:var(--font-mono);
  font-size:14px;font-weight:600;
  color:var(--text-primary);
  transition:all var(--transition-base);
}
.timer.running{border-color:var(--green);color:var(--green)}
.timer .timer-dot{
  width:7px;height:7px;
  border-radius:50%;
  background:var(--text-tertiary);
  transition:background var(--transition-base);
}
.timer.running .timer-dot{background:var(--green);animation:pulse 1.2s infinite}

/* ============================================================
   Appendix Table
   ============================================================ */
.appendix-table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  margin:12px 0;
}
.appendix-table th{
  text-align:left;
  padding:10px 14px;
  background:var(--bg-inset);
  font-weight:600;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--text-tertiary);
  border-bottom:2px solid var(--border-color-strong);
}
.appendix-table td{
  padding:9px 14px;
  border-bottom:1px solid var(--border-color);
  color:var(--text-secondary);
  vertical-align:top;
}
.appendix-table tr:hover td{background:var(--hover-bg)}
.appendix-table code{
  font-size:12px;
  padding:1px 5px;
  background:var(--code-bg);
  border-radius:4px;
}

/* ============================================================
   Search Results
   ============================================================ */
.search-results{
  position:absolute;
  top:calc(100% + 6px);
  left:0;right:0;
  background:var(--bg-elevated);
  border:1px solid var(--border-color-strong);
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg);
  max-height:380px;
  overflow-y:auto;
  z-index:200;
  display:none;
}
.search-results.visible{display:block}
.search-result-item{
  padding:10px 16px;
  font-size:13px;
  cursor:pointer;
  border-bottom:1px solid var(--border-color);
  transition:background var(--transition-fast);
}
.search-result-item:hover{background:var(--hover-bg)}
.search-result-item:last-child{border-bottom:none}
.search-result-item .sr-title{font-weight:600;color:var(--text-primary)}
.search-result-item .sr-path{
  font-size:11px;color:var(--text-tertiary);
  margin-top:2px;
}
.search-result-item mark{
  background:rgba(99,102,241,.2);
  color:var(--accent);
  border-radius:2px;
  padding:0 1px;
}

/* ============================================================
   Animations
   ============================================================ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.4}
}
.fade-up{
  animation:fadeUp .45s cubic-bezier(.4,0,.2,1) both;
}
.fade-up-d1{animation-delay:.06s}
.fade-up-d2{animation-delay:.12s}
.fade-up-d3{animation-delay:.18s}
.fade-up-d4{animation-delay:.24s}

/* ============================================================
   Responsive
   ============================================================ */
@media(max-width:900px){
  .sidebar{
    position:fixed;
    left:0;top:var(--topnav-h);
    z-index:90;
    transform:translateX(-100%);
    transition:transform var(--transition-base);
    box-shadow:var(--shadow-lg);
  }
  .sidebar.open{transform:translateX(0)}
  .main{padding:20px 18px 60px}
  .brand-sub{display:none}
  .mode-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .section-card{padding:20px 18px}
}
@media(max-width:640px){
  .topnav{gap:6px;padding:0 12px}
  .search-wrap{min-width:80px}
  .mode-tab{padding:5px 10px;font-size:12px}
  .progress-pill{display:none}
  .interview-grid{grid-template-columns:1fr}
  .fault-tree{grid-template-columns:1fr}
  .section-card h2{font-size:17px}
}
</style>
</head>
