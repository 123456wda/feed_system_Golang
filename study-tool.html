lv2:`<p><strong>点赞：不预检查</strong>（like_service.go 第 74 行注释）：</p><pre><code><span class="cm">// MQ 路径不检查是否已点赞——唯一索引校验由消费者负责</span>
<span class="cm">// 消费者遇 1062 重复键时静默跳过（幂等）</span>
likeMQSent := s.likeMQ.Like(ctx, accountID, videoID) == <span class="kw">nil</span></code></pre><p><strong>关注：保留预检查 + 唯一索引兜底</strong>（social/service.go 第 26 行注释）：</p><pre><code><span class="cm">// 注意：IsFollowed 预检查存在 TOCTOU 竞态窗口</span>
<span class="cm">// 但 uniqueIndex 会兜底防止重复插入</span>
<span class="cm">// 保留预检查是为了给用户明确的错误提示</span>
isFollowed, _ := s.repo.IsFollowed(ctx, social)
<span class="kw">if</span> isFollowed {
    <span class="kw">return</span> errors.New(<span class="str">"already followed"</span>)
}
<span class="cm">// MQ 通知下游（错误静默忽略）</span>
s.socialMQ.Follow(ctx, followerID, vloggerID)
<span class="cm">// 同步写库</span>
<span class="kw">return</span> s.repo.Follow(ctx, social)</code></pre>`,
lv3:`<p><strong>Q: 为什么点赞不预检查，关注保留预检查？</strong></p><ul><li>点赞是高频操作（每秒可能上百次），预检查成本不值得，直接依赖唯一索引</li><li>关注是低频操作（每秒几次），预检查可以给用户友好提示（"已经关注了" vs 数据库 1062 错误）</li><li>这是<strong>用户体验优先</strong>的设计取舍</li></ul><p><strong>Q: 唯一索引 vs 乐观锁？</strong></p><ul><li>唯一索引：适合"不能重复"的场景（点赞、关注）</li><li>乐观锁（version 字段）：适合"不能并发修改"的场景（余额扣减）</li></ul>`},
{q:"限流中间件怎么实现的？固定窗口和滑动窗口有什么区别？",
lv1:`<p>项目使用<strong>双策略限流</strong>，按业务选择：</p><ul><li><strong>固定窗口</strong>（登录/注册）：INCR + PEXPIRE，简单高效，低频场景够用</li><li><strong>滑动窗口</strong>（点赞/评论/关注）：ZSET + Lua 脚本，任意时刻严格不超 limit，无边界突刺</li><li>Key 策略：按用户 ID（KeyByAccount）或 IP（KeyByIP）</li><li>超限返回 429 Too Many Requests</li><li>Redis 故障时 fail-open（放行）</li></ul>`,
lv2:`<p><strong>固定窗口</strong>（ratelimit.go:Limit）：</p><pre><code><span class="kw">func</span> Limit(cache, keyPrefix, maxRequests, window, keyFunc) gin.HandlerFunc {
    <span class="kw">return</span> <span class="kw">func</span>(c *gin.Context) {
        <span class="kw">if</span> cache == <span class="kw">nil</span> { c.Next(); <span class="kw">return</span> }  <span class="cm">// fail-open</span>
        subject, _ := keyFunc(c)
        key := fmt.Sprintf(<span class="str">"feedsystem:ratelimit:%s:%s"</span>, keyPrefix, subject)
        count, _ := cache.IncrementWithExpire(ctx, key, window)
        <span class="kw">if</span> count > maxRequests {
            c.AbortWithStatusJSON(<span class="num">429</span>, gin.H{<span class="str">"error"</span>: <span class="str">"too many requests"</span>})
            <span class="kw">return</span>
        }
        c.Next()
    }
}</code></pre><p><strong>滑动窗口</strong>（sliding_window.go:SlidingWindowLimit）：</p><pre><code><span class="cm">// Lua 脚本原子执行：清理过期 → 计数 → 条件写入</span>
redis.call(<span class="str">'ZREMRANGEBYSCORE'</span>, key, <span class="str">'-inf'</span>, now - window)
<span class="kw">local</span> count = redis.call(<span class="str">'ZCARD'</span>, key)
<span class="kw">if</span> count < limit <span class="kw">then</span>
    redis.call(<span class="str">'ZADD'</span>, key, now, member)
    redis.call(<span class="str">'PEXPIRE'</span>, key, window)
    <span class="kw">return</span> 0  <span class="cm">-- 允许</span>
<span class="kw">end</span>
<span class="kw">return</span> 1  <span class="cm">-- 拒绝</span></code></pre><p><strong>路由配置</strong>（router.go）：</p><pre><code><span class="cm">// 固定窗口：登录/注册（低频）</span>
loginLimiter := ratelimit.Limit(cache, <span class="str">"account_login"</span>, <span class="num">10</span>, time.Minute, ratelimit.KeyByIP)
<span class="cm">// 滑动窗口：点赞/评论/关注（高频，避免边界突刺）</span>
likeLimiter := ratelimit.SlidingWindowLimitByAccount(cache, <span class="str">"like_write"</span>, <span class="num">30</span>, time.Minute)
protectedLikeGroup.POST(<span class="str">"/like"</span>, likeLimiter, likeHandler.Like)</code></pre>`,
lv3:`<p><strong>Q: 固定窗口的临界问题？怎么解决？</strong></p><p>窗口边界可能突发 2x 流量。本项目已用滑动窗口解决（点赞/评论/关注），固定窗口仅用于登录/注册（低频，影响小）。</p><p>其他限流算法：</p><ul><li>令牌桶：允许突发（桶满时一次性发完）</li><li>漏桶：平滑流量（固定速率）</li></ul><p><strong>Q: fail-open 还是 fail-close？</strong></p><ul><li>fail-open：Redis 故障时放行（本项目用的）→ 可用性优先</li><li>fail-close：Redis 故障时拒绝 → 安全优先</li></ul>`},
{q:"bcrypt 相比 MD5/SHA256 做密码哈希的优势是什么？",
lv1:`<p>密码哈希的核心要求：<strong>不可逆</strong>（不能从哈希还原密码）、<strong>抗暴力破解</strong>（计算足够慢）、<strong>抗彩虹表</strong>（自带 salt）。</p><ul><li>MD5/SHA256：太快（每秒可算数十亿次），不适合密码</li><li>bcrypt：自带 salt + 计算慢（~100ms）+ 可调 cost</li></ul>`,
lv2:`<p>项目中 bcrypt 的使用（account/service.go）：</p><pre><code><span class="cm">// 注册时哈希密码</span>
hashedPassword, _ := bcrypt.GenerateFromPassword([]<span class="fn">byte</span>(password), bcrypt.DefaultCost)
<span class="cm">// 登录时验证</span>
err := bcrypt.CompareHashAndPassword(hashedPassword, []<span class="fn">byte</span>(password))</code></pre><p><strong>bcrypt 原理</strong>：</p><ul><li>基于 Blowfish 加密算法</li><li>自带随机 salt（每次哈希不同，防彩虹表）</li><li>可调 cost 参数（默认 10，每增加 1 计算时间翻倍）</li><li>~100ms 计算时间，暴力破解成本极高</li></ul>`,
lv3:`<p><strong>Q: cost 参数选多大？</strong></p><p>默认 cost=10（~100ms）。建议：根据服务器性能调整，目标是登录验证不超过 500ms。cost=12 ~400ms，cost=14 ~1.6s。</p><p><strong>Q: argon2 vs bcrypt？</strong></p><p>Argon2 是 2015 年密码哈希竞赛冠军，抗 GPU/ASIC 攻击更强。Go 标准库没有内置，需要第三方库。bcrypt 足够安全，项目规模下不需要换。</p>`}
],quiz:[
{q:"JWT 吊销的实现方式有哪些？本项目用的哪种？和黑名单方案相比有什么优劣？",hint:"本项目用 Redis Token 存储（白名单）。黑名单方案存被吊销的 token，白名单存有效 token。白名单更安全（默认拒绝），黑名单更省空间（只存少量被吊销的）。"},
{q:"TOCTOU 是什么？为什么点赞不用预检查？如果不用唯一索引，还有什么方式防止重复？",hint:"检查到使用之间的竞态窗口。点赞高频操作预检查成本不值得。替代方案：Redis SET 去重、分布式锁、乐观锁 version 字段。"},
{q:"固定窗口限流的临界问题怎么解决？滑动窗口、令牌桶、漏桶各自适合什么场景？",hint:"本项目已用滑动窗口解决（点赞/评论/关注用 ZSET+Lua，登录/注册用固定窗口）。令牌桶：允许突发（API 网关）。漏桶：平滑流量（消息处理）。"},
{q:"SoftJWTAuth 在什么时候有用？如果 SoftJWTAuth 下 token 过期了，应该返回 401 还是放行？",hint:"公共接口可选认证。token 过期应返回 401（区分'没带 token'和'带了无效 token'），前端据此决定是否重新登录。"},
{q:"bcrypt 相比 MD5/SHA256 做密码哈希的优势？bcrypt 的 cost 参数设为 10 和 14 分别意味着什么？",hint:"自带 salt + 计算慢。cost=10 约 100ms，cost=14 约 1.6s。每增加 1，计算时间翻倍。"},
{q:"HS256 和 RS256 的区别？什么场景下必须用 RS256？",hint:"HS256 对称（同一密钥签名和验证），RS256 非对称（私钥签名，公钥验证）。微服务架构下多个服务需要验证 token 时必须用 RS256，避免密钥泄露。"},
{q:"JWT 的 payload 是 Base64 编码而非加密，这意味着什么？",hint:"任何人都能解码 payload 看到内容。不能放敏感信息（密码、手机号）。只放 ID 和过期时间等非敏感数据。"}
]},

{id:6,title:"第6章：架构工程实践",topics:[
{q:"分层架构中事务怎么管理？InTx 模式是什么？",
lv1:`<p>Service 层不直接访问 repo.db，事务通过 <code class="inline">Transaction</code> 方法获取 tx，再调用 repo 的 InTx 方法。</p><p>好处：事务控制权在 Service 层（决定哪些操作在同一个事务里），数据操作在 Repository 层（怎么操作数据），职责清晰。</p>`,
lv2:`<pre><code><span class="cm">// like_service.go:Like</span>
err := s.likeRepo.Transaction(ctx, <span class="kw">func</span>(tx *gorm.DB) error {
    <span class="cm">// 在事务内调用 InTx 方法</span>
    created, _ := s.likeRepo.LikeInTx(ctx, tx, like)
    <span class="kw">if</span> created {
        s.videoRepo.ChangeLikesCount(ctx, tx, videoID, <span class="num">1</span>)
        s.videoRepo.ChangePopularity(ctx, tx, videoID, <span class="num">1</span>)
    }
    <span class="kw">return</span> <span class="kw">nil</span>
})
<span class="cm">// like_repo.go:Transaction</span>
<span class="kw">func</span> (r *LikeRepository) Transaction(ctx, fn) error {
    <span class="kw">return</span> r.db.WithContext(ctx).Transaction(fn)
}
<span class="cm">// video_repo.go:ChangeLikesCount</span>
<span class="kw">func</span> (r *VideoRepository) ChangeLikesCount(ctx, tx, id, change) {
    db := tx
    <span class="kw">if</span> db == <span class="kw">nil</span> { db = r.db }  <span class="cm">// 非事务时降级</span>
    <span class="kw">return</span> db.Model(&amp;Video{}).UpdateColumn(...)
}</code></pre>`,
lv3:`<p><strong>Q: 如果不传 tx 会怎样？</strong></p><p>ChangeLikesCount 检测到 tx==nil，自动使用 r.db（非事务模式）。适合不需要事务的场景。</p><p><strong>Q: 嵌套事务？</strong></p><p>GORM 的 Transaction 方法支持嵌套（内部使用 SavePoint），但项目中没有嵌套场景。</p>`},
{q:"GREATEST 函数防负数是什么设计？还有哪些防御性编程？",
lv1:`<p><strong>并发取消赞</strong>可能导致点赞计数减成负数。GREATEST 函数兜底：</p><pre><code>UPDATE videos SET likes_count = GREATEST(likes_count + ?, 0) WHERE id = ?</code></pre><p>即使并发扣减导致负数，也会被修正为 0。</p>`,
lv2:`<p>实现在 video_repo.go:ChangeLikesCount 第 73 行：</p><pre><code>db.WithContext(ctx).Model(&amp;Video{}).
    Where(<span class="str">"id = ?"</span>, id).
    UpdateColumn(<span class="str">"likes_count"</span>,
        gorm.Expr(<span class="str">"GREATEST(likes_count + ?, 0)"</span>, change)).Error</code></pre><p><strong>其他防御措施</strong>：</p><ul><li>空指针检查：redis.go 中 <code class="inline">if c == nil || c.rdb == nil { return }</code></li><li>超时设置：Redis 操作 50ms 超时，避免阻塞请求</li><li>错误码判断：1062 唯一键冲突静默忽略</li></ul>`,
lv3:`<p><strong>Q: 为什么不用乐观锁（version 字段）？</strong></p><p>乐观锁适合"读-改-写"场景（余额扣减），需要先读 version 再 WHERE version=N。点赞只需要原子 +1/-1，GORM 的 UpdateColumn + GREATEST 更简单高效。</p>`},
{q:"WaitGroup + Mutex 并行查询是怎么用的？",
lv1:`<p>多个 video ID 需要查询 DB 时，串行查询太慢。用 WaitGroup + Mutex 实现并行查询：</p><ul><li><strong>WaitGroup</strong>：等待所有 goroutine 完成</li><li><strong>Mutex</strong>：保护共享 map 的并发写入</li></ul>`,
lv2:`<p>实现在 GetVideoByIDs 第 480 行：</p><pre><code><span class="kw">var</span> wg sync.WaitGroup
<span class="kw">var</span> mu sync.Mutex
<span class="kw">for</span> _, id := <span class="kw">range</span> missedL2 {
    wg.Add(<span class="num">1</span>)
    <span class="kw">go</span> <span class="kw">func</span>(videoID uint) {
        <span class="kw">defer</span> wg.Done()
        sfKey := fmt.Sprintf(<span class="str">"sf:entity:%d"</span>, videoID)
        v, _, _ := f.requestGroup.Do(sfKey, <span class="kw">func</span>() {
            <span class="kw">return</span> f.repo.GetByIDs(ctx, []<span class="fn">uint</span>{videoID})
        })
        <span class="kw">if</span> v != <span class="kw">nil</span> {
            mu.Lock()
            videoMap[id] = safeCopy
            mu.Unlock()
            <span class="cm">// 写回 L1 缓存</span>
            f.localcache.Set(cacheKey, safeCopy, <span class="num">5</span>*time.Second)
        }
    }(id)
}
wg.Wait()</code></pre>`,
lv3:`<p><strong>Q: sync.Map vs Mutex+Map？</strong></p><ul><li>sync.Map：适合读多写少、key 稳定的场景</li><li>Mutex+Map：适合写多、key 频繁变化的场景</li><li>本项目写入频率不高（每次请求最多写几个 key），Mutex 更简单</li></ul><p><strong>Q: errgroup vs WaitGroup？</strong></p><p>errgroup 自动收集第一个错误并取消其他 goroutine。本项目需要所有 ID 都查询（即使部分失败），所以用 WaitGroup 更合适。</p>`},
{q:"优雅停机怎么实现的？Worker 和 API 的停机流程有什么区别？",
lv1:`<p>优雅停机的核心：<strong>停止接收新请求 → 等待活跃请求完成 → 释放资源 → 退出</strong>。</p><p>不优雅的停机：直接 kill 进程，活跃请求中断，MQ 消息可能丢失。</p>`,
lv2:`<p><strong>API 进程</strong>（router.go:GracefulShutdown 第 220 行）：</p><pre><code><span class="kw">func</span> GracefulShutdown(srv *http.Server) {
    stop := <span class="kw">make</span>(<span class="kw">chan</span> os.Signal, <span class="num">1</span>)
    signal.Notify(stop, os.Interrupt, syscall.SIGTERM)
    &lt;-stop  <span class="cm">// 阻塞直到收到信号</span>
    log.Printf(<span class="str">"api server is shutting down..."</span>)
    ctx, cancel := context.WithTimeout(context.Background(), <span class="num">5</span>*time.Second)
    <span class="kw">defer</span> cancel()
    srv.Shutdown(ctx)  <span class="cm">// 等待活跃请求完成</span>
}</code></pre><p><strong>Worker 进程</strong>（cmd/worker/main.go 第 148 行）：</p><pre><code>ctx, stop := signal.NotifyContext(context.Background(), os.Interrupt, syscall.SIGTERM)
<span class="kw">defer</span> stop()
<span class="cm">// 4 个 Worker goroutine 共享 ctx</span>
<span class="kw">go</span> socialWorker.Run(ctx)
<span class="kw">go</span> likeWorker.Run(ctx)
<span class="cm">// ...</span>
err = &lt;-errCh  <span class="cm">// 等待第一个错误或 ctx 取消</span></code></pre><p><strong>区别</strong>：API 用 signal.Notify + Shutdown（HTTP 层面优雅停机），Worker 用 signal.NotifyContext（传播取消信号到所有 Worker goroutine）。</p>`,
lv3:`<p><strong>Q: K8s preStop hook？</strong></p><p>K8s 发送 SIGTERM 前先执行 preStop hook（如 sleep 10s），给负载均衡器时间摘除 Pod。配合 terminationGracePeriodSeconds（默认 30s）使用。</p><p><strong>Q: MQ 消费中的消息怎么处理？</strong></p><p>Worker 收到 SIGTERM 后，ctx 被取消，正在处理的消息完成后再退出。未 Ack 的消息会重新入队，由其他 Worker 处理。</p>`}
],quiz:[
{q:"为什么 Service 层不直接访问 repo.db？如果 Service 直接用 db 会破坏什么设计原则？",hint:"破坏分层架构和单一职责。事务控制权在 Service 层，数据操作在 Repository 层，职责清晰。直接用 db 会导致事务管理散落各处。"},
{q:"GREATEST 函数的作用是什么？在什么并发场景下 likes_count 可能变成负数？",hint:"GREATEST(likes_count + ?, 0) 保证不为负。场景：用户点赞后快速取消，两条消息乱序到达 Worker，先执行 -1 再执行 +1，中间状态可能为负。"},
{q:"singleflight 和 sync.Once 的区别？singleflight 的结果会被缓存吗？",hint:"singleflight 按 key 去重且不缓存（每次调用都可能执行）。sync.Once 只执行一次且永久缓存结果。"},
{q:"优雅停机的流程是什么？如果有一个请求处理了 10 秒还没完成，会怎样？",hint:"signal.NotifyContext → srv.Shutdown（5s 超时）。超过 5s 强制关闭，该请求会收到 context canceled 错误。"},
{q:"Dockerfile 多阶段构建的好处？为什么不用 scratch 而用 alpine？",hint:"scratch 没有 shell 和 ca-certificates，无法做 HTTPS 请求和调试。alpine 有最小工具集，体积只多几 MB。"},
{q:"context.WithTimeout(context.Background(), 50ms) 为什么用 Background 而不是传入的 ctx？",hint:"用 Background 是因为即使用户请求被取消，Redis 热度更新仍应完成。用传入的 ctx 会导致客户端断开时连带取消 Redis 操作。"},
{q:"WaitGroup + Mutex 的组合模式中，如果某个 goroutine panic 了，wg.Wait() 会永远阻塞吗？怎么防护？",hint:"是的，panic 的 goroutine 不会执行 defer wg.Done()。防护：在 goroutine 内 defer recover() + wg.Done()。"}
]},

{id:7,title:"第7章：可观测性与性能优化",topics:[
{q:"Prometheus 的四种指标类型分别是什么？项目中用了哪些？",
lv1:`<p>Prometheus 有四种指标类型：</p><ul><li><strong>Counter</strong>（计数器）：只增不减，适合累计值。如请求总数、错误总数</li><li><strong>Gauge</strong>（仪表盘）：可增可减，适合当前值。如内存使用、队列长度</li><li><strong>Histogram</strong>（直方图）：分桶统计，适合延迟分布。可算 P50/P95/P99</li><li><strong>Summary</summary>（摘要）：类似 Histogram，客户端算百分位</li></ul><p>本项目用了 <strong>Counter</strong>（HTTP 请求计数、Redis 操作计数、MQ 消息计数）和 <strong>Histogram</strong>（HTTP 延迟、Redis 操作延迟）。</p>`,
lv2:`<p>指标定义在 <code class="inline">internal/observability/metrics.go</code>：</p><pre><code><span class="cm">// Counter — HTTP 请求总数</span>
<span class="kw">var</span> HTTPRequestsTotal = prometheus.NewCounterVec(
    prometheus.CounterOpts{
        Namespace: <span class="str">"feedsystem"</span>,
        Name:      <span class="str">"http_requests_total"</span>,
    },
    []<span class="fn">string</span>{<span class="str">"method"</span>, <span class="str">"path"</span>, <span class="str">"status_code"</span>},
)
<span class="cm">// Histogram — HTTP 延迟分布</span>
<span class="kw">var</span> HTTPRequestDuration = prometheus.NewHistogramVec(
    prometheus.HistogramOpts{
        Namespace: <span class="str">"feedsystem"</span>,
        Name:      <span class="str">"http_request_duration_seconds"</span>,
        Buckets:   []<span class="fn">float64</span>{<span class="num">0.001</span>, <span class="num">0.005</span>, <span class="num">0.01</span>, <span class="num">0.025</span>, <span class="num">0.05</span>, <span class="num">0.1</span>, <span class="num">0.25</span>, <span class="num">0.5</span>, <span class="num">1</span>, <span class="num">2.5</span>, <span class="num">5</span>},
    },
    []<span class="fn">string</span>{<span class="str">"method"</span>, <span class="str">"path"</span>},
)
<span class="cm">// 注册到 Prometheus</span>
<span class="kw">func</span> init() {
    prometheus.MustRegister(HTTPRequestsTotal)
    prometheus.MustRegister(HTTPRequestDuration)
}</code></pre><p><strong>Namespace</strong> 前缀 <code class="inline">feedsystem</code> 避免多项目指标名冲突。Buckets 单位是秒，0.001=1ms。</p>`,
lv3:`<p><strong>Q: Histogram 的 Buckets 怎么选？</strong></p><p>根据业务延迟分布选择。本项目 HTTP 延迟从 0.4ms 到 100ms+，所以 Buckets 从 1ms 到 5s。Redis 延迟更低（微秒级），Buckets 从 0.1ms 起步。</p><p><strong>Q: Counter 能减少吗？</strong></p><p>不能。Counter 只能 Inc() 或 Add()，调用 Reset() 会被 Prometheus 视为异常（counter reset）。如果需要可增可减的值，用 Gauge。</p><p><strong>Q: Summary vs Histogram？</strong></p><p>Histogram 在服务端分桶，支持聚合（多实例的桶可以合并算全局百分位）。Summary 在客户端算百分位，不能聚合。生产环境推荐 Histogram。</p>`},
{q:"Gin Middleware 怎么自动采集 HTTP 指标？为什么用 FullPath？",
lv1:`<p>Gin 中间件在请求前后执行代码。MetricsMiddleware 在请求开始时记录时间，请求结束后计算耗时，写入 Prometheus 指标。</p><p>用 <code class="inline">c.FullPath()</code> 获取路由模板（如 <code class="inline">/video/getDetail</code>），而非实际请求路径（如 <code class="inline">/video/getDetail/123</code>），避免因参数不同产生无数 label。</p>`,
lv2:`<p>实现在 <code class="inline">internal/observability/middleware.go</code>：</p><pre><code><span class="kw">func</span> MetricsMiddleware() gin.HandlerFunc {
    <span class="kw">return</span> <span class="kw">func</span>(c *gin.Context) {
        start := time.Now()
        c.Next()  <span class="cm">// 让请求继续执行</span>
        duration := time.Since(start).Seconds()
        path := c.FullPath()       <span class="cm">// 路由模板</span>
        method := c.Request.Method
        statusCode := strconv.Itoa(c.Writer.Status())
        HTTPRequestsTotal.With(prometheus.Labels{
            <span class="str">"method"</span>: method, <span class="str">"path"</span>: path, <span class="str">"status_code"</span>: statusCode,
        }).Inc()
        HTTPRequestDuration.With(prometheus.Labels{
            <span class="str">"method"</span>: method, <span class="str">"path"</span>: path,
        }).Observe(duration)
    }
}</code></pre><p><strong>注册顺序</strong>：在 router.go 中 <code class="inline">r.Use(observability.MetricsMiddleware())</code> 放在最前面，确保所有请求都被采集。</p>`,
lv3:`<p><strong>Q: 如果用 c.Request.URL.Path 会怎样？</strong></p><p>每个不同的请求路径都会产生一个独立的 label 组合。比如 <code class="inline">/video/getDetail/1</code>、<code class="inline">/video/getDetail/2</code>... 会导致 Prometheus 的时间序列数爆炸（cardinality explosion），内存和存储急剧增长。</p><p><strong>Q: c.Next() 前后的时间差包含了什么？</strong></p><p>包含所有后续中间件（JWT、限流）和 handler 的执行时间。是端到端的请求延迟，不只是业务逻辑。</p><p><strong>Q: /metrics 端点本身的请求会被采集吗？</strong></p><p>会。Prometheus 每 15 秒 scrape 一次 /metrics，这些 GET 请求也会被记录。可以通过 path 过滤排除。</p>`},
{q:"Redis 和 MQ 的自定义埋点怎么做的？",
lv1:`<p>HTTP 指标由 middleware 自动采集，但 Redis 操作和 MQ 消息需要<strong>手动埋点</strong>——在业务代码里调用 Prometheus API 记录数据。</p><p>Redis 埋点在 cache.go 的 Get/Set/Del 方法里，记录操作类型和耗时。MQ 埋点在 PublishJSON 方法里记录发布计数，在 Worker 的 handleDelivery 里记录消费计数。</p>`,
lv2:`<p><strong>Redis 埋点</strong>（cache.go）：</p><pre><code><span class="kw">func</span> (c *Client) GetBytes(ctx, key) ([]<span class="fn">byte</span>, error) {
    start := time.Now()
    val, err := c.rdb.Get(ctx, key).Result()
    observability.RedisOperationsTotal.WithLabelValues(<span class="str">"get"</span>).Inc()
    observability.RedisOperationDuration.WithLabelValues(<span class="str">"get"</span>).Observe(time.Since(start).Seconds())
    <span class="kw">return</span> []<span class="fn">byte</span>(val), err
}</code></pre><p><strong>MQ 发布埋点</strong>（rabbitmq.go:PublishJSON）：</p><pre><code>err = r.Ch.PublishWithContext(ctx, exchange, routineKey, ...)
<span class="kw">if</span> err != <span class="kw">nil</span> { <span class="kw">return</span> err }
observability.MQMessagesPublished.WithLabelValues(exchange, routineKey).Inc()</code></pre><p><strong>MQ 消费埋点</strong>（likeworker.go:handleDelivery）：</p><pre><code>_ = d.Ack(<span class="kw">false</span>)
rabbitmq.IncrConsumed(w.queue)  <span class="cm">// 递增消费计数</span></code></pre>`,
lv3:`<p><strong>Q: 为什么 Redis 埋点记录耗时而不只是计数？</strong></p><p>计数只能看 QPS，耗时才能发现性能退化。比如 Redis 慢查询导致 P95 从 0.5ms 升到 5ms，计数不变但延迟恶化。</p><p><strong>Q: 埋点失败会影响业务吗？</strong></p><p>不会。Prometheus 的 Inc()/Observe() 是内存操作，不涉及网络，失败只影响监控数据不影响业务。</p><p><strong>Q: 为什么 MQ 消费埋点只加了 LikeWorker？</strong></p><p>当前只在 LikeWorker 加了 IncrConsumed()，其他 Worker 可以用同样方式补全。生产环境建议所有 Worker 都加。</p>`},
{q:"压测发现了什么瓶颈？怎么定位的？",
lv1:`<p>接入 Prometheus 后，用 hey 压测工具对比不同接口的延迟：</p><ul><li><code class="inline">/feed/listLatest</code> 的 P95 是 <strong>1.1ms</strong>（有 Redis 缓存）</li><li><code class="inline">/comment/listAll</code> 的 P95 是 <strong>29.1ms</strong>（纯 MySQL 查询）</li><li>两者差距 <strong>22 倍</strong></li></ul><p>通过 Prometheus 指标 + 源码分析，定位到两个瓶颈：comment 无缓存 + MySQL 连接池未配置。</p>`,
lv2:`<p><strong>瓶颈 1：comment/listAll 无缓存</strong></p><p>每次请求执行 2 次 MySQL 查询：</p><pre><code>GetAll()
  → videoRepo.IsExist(ctx, videoID)    <span class="cm">// 第 1 次 MySQL（冗余）</span>
  → repo.GetAllComments(ctx, videoID)  <span class="cm">// 第 2 次 MySQL</span></code></pre><p>IsExist 检查是多余的——视频不存在时 GetAllComments 返回空列表，语义等价。</p><p><strong>瓶颈 2：MySQL 连接池未调优</strong></p><pre><code>db, err := gorm.Open(mysql.Open(dsn), &amp;gorm.Config{})
<span class="cm">// 没有调用 SetMaxOpenConns / SetMaxIdleConns</span></code></pre><p>GORM 默认：MaxOpenConns=0（无限制）、MaxIdleConns=2。高并发下连接等待严重，P99 跳到 136ms。</p>`,
lv3:`<p><strong>Q: 怎么用 Prometheus 定位瓶颈？</strong></p><p>对比不同接口的 P95 延迟。有 Redis 缓存的接口（feed）延迟低且平稳，纯 MySQL 的接口（comment）延迟高且随并发增长。再看 Redis 操作指标，发现 comment 接口没有 Redis GET，确认无缓存。</p><p><strong>Q: MaxIdleConns=2 有什么问题？</strong></p><p>大多数请求需要新建 TCP 连接（3 次握手 + MySQL 认证），每次新建连接开销约 1-2ms。高并发下 100 个请求同时来，只有 2 个能复用空闲连接，其余 98 个都要新建。</p>`},
{q:"分页缓存方案是怎么迭代的？整体缓存有什么问题？",
lv1:`<p>一开始想用整体缓存（整个评论列表缓存为一个 key），分析后发现三个问题，改成分页缓存。</p><p>核心改进：缓存粒度从"一个视频的全部评论"细化到"一个视频的某一页评论"，Value 从 50KB 降到 2KB。</p>`,
lv2:`<p><strong>整体缓存的三个问题：</strong></p><ol><li><strong>大 Value 序列化开销</strong>：500 条评论 = 50KB JSON，每次请求序列化/反序列化 CPU 开销大</li><li><strong>缓存失效雪崩</strong>：一条新评论 → 整个 key DEL → 高并发下全部穿透到 MySQL</li><li><strong>全量数据传输</strong>：前端只需要 20 条，API 返回 500 条</li></ol><p><strong>分页缓存方案：</strong></p><pre><code>缓存 Key:   comment:list:video:{videoID}:page:{page}:size:{pageSize}
缓存 Value:  单页评论（最多 20 条，约 2KB）
TTL:         30 秒
失效时机:    评论发布/删除时主动 DEL 第 1 页</code></pre><p><strong>对比：</strong></p><table><tr><td>维度</td><td>整体缓存</td><td>分页缓存</td></tr><tr><td>Value 大小</td><td>50KB</td><td>2KB</td></tr><tr><td>缓存失效代价</td><td>全量回查 500 条</td><td>单页回查 20 条</td></tr><tr><td>并发穿透风险</td><td>高</td><td>低</td></tr></table>`,
lv3:`<p><strong>Q: 为什么 TTL 选 30 秒？</strong></p><p>评论是高频写操作，TTL 太长导致用户看到过期数据。30 秒在缓存命中率和数据新鲜度之间平衡。配合主动失效（写操作时 DEL），大部分场景数据是实时的。</p><p><strong>Q: 为什么只失效第 1 页？</strong></p><p>第 1 页是最常被查询的（用户打开评论区默认看最新评论）。生产环境可用 Redis SCAN + DEL 模式匹配，或版本号方案失效所有页。</p><p><strong>Q: 分页缓存的缺点？</strong></p><p>不同页独立缓存，如果用户频繁翻页，每页第一次访问都会 miss。但在实际场景中，绝大多数用户只看第 1 页，影响不大。</p>`},
{q:"MySQL 连接池四个参数怎么选？为什么这么配？",
lv1:`<p>Go 的 database/sql 默认配置不适合生产环境：</p><ul><li>MaxOpenConns=0（无限制）→ 可能打爆 MySQL max_connections</li><li>MaxIdleConns=2 → 大多数请求需新建连接</li><li>ConnMaxLifetime=0（永不过期）→ 可能使用过期连接</li></ul><p>本项目配置：MaxOpenConns=100、MaxIdleConns=25、ConnMaxLifetime=5min、ConnMaxIdleTime=3min。</p>`,
lv2:`<pre><code>sqlDB.SetMaxOpenConns(<span class="num">100</span>)                <span class="cm">// 最大打开连接数</span>
sqlDB.SetMaxIdleConns(<span class="num">25</span>)                 <span class="cm">// 最大空闲连接数</span>
sqlDB.SetConnMaxLifetime(<span class="num">5</span> * time.Minute)  <span class="cm">// 连接最大存活时间</span>
sqlDB.SetConnMaxIdleTime(<span class="num">3</span> * time.Minute)  <span class="cm">// 空闲连接最大存活时间</span></code></pre><p><strong>参数选择理由：</strong></p><ul><li><strong>MaxOpenConns=100</strong>：MySQL 默认 max_connections=151，留 51 给系统和管理连接</li><li><strong>MaxIdleConns=25</strong>：空闲连接数设为最大连接的 1/4，平衡内存占用和连接复用</li><li><strong>ConnMaxLifetime=5min</strong>：定期回收连接，避免使用过期连接（MySQL wait_timeout 默认 8h）</li><li><strong>ConnMaxIdleTime=3min</strong>：空闲连接 3 分钟后回收，释放资源</li></ul>`,
lv3:`<p><strong>Q: MaxOpenConns 设为 0 有什么问题？</strong></p><p>无限制意味着高并发下可能创建几百个连接，打爆 MySQL 的 max_connections（默认 151），导致新连接被拒绝。</p><p><strong>Q: MaxIdleConns 太小有什么问题？</strong></p><p>大多数请求需要新建连接（TCP 握手 + MySQL 认证），每次新建开销 1-2ms。MaxIdleConns=25 意味着 25 个请求可以直接复用空闲连接。</p><p><strong>Q: ConnMaxLifetime 和 ConnMaxIdleTime 的区别？</strong></p><p>ConnMaxLifetime 是连接的绝对最大存活时间（无论是否在用），ConnMaxIdleTime 是空闲连接的最大存活时间。两者配合保证连接不会"僵死"。</p>`},
{q:"项目 9 个 Prometheus 指标分别是什么？",
lv1:`<p>项目共注册了 <strong>9 个 Prometheus 指标</strong>，覆盖 HTTP、Redis、MQ、熔断器、限流五个维度：</p><table><tr><td>指标名</td><td>类型</td><td>标签</td><td>采集方式</td></tr><tr><td>feedsystem_http_requests_total</td><td>Counter</td><td>method, path, status_code</td><td>Gin middleware 自动</td></tr><tr><td>feedsystem_http_request_duration_seconds</td><td>Histogram</td><td>method, path</td><td>Gin middleware 自动</td></tr><tr><td>feedsystem_redis_operations_total</td><td>Counter</td><td>operation, status</td><td>手动埋点</td></tr><tr><td>feedsystem_redis_operation_duration_seconds</td><td>Histogram</td><td>operation, status</td><td>手动埋点</td></tr><tr><td>feedsystem_mq_messages_published_total</td><td>Counter</td><td>exchange, routing_key</td><td>PublishJSON 手动</td></tr><tr><td>feedsystem_mq_messages_consumed_total</td><td>Counter</td><td>queue</td><td>Worker 手动</td></tr><tr><td>feedsystem_circuit_breaker_state_changes_total</td><td>Counter</td><td>to_state</td><td>OnStateChange</td></tr><tr><td>feedsystem_circuit_breaker_rejections_total</td><td>Counter</td><td>—</td><td>Execute</td></tr><tr><td>feedsystem_ratelimit_rejections_total</td><td>Counter</td><td>limiter, prefix</td><td>ratelimit 中间件</td></tr></table><p>所有指标在 <code class="inline">metrics.go</code> 的 <code class="inline">init()</code> 中注册。</p>`,
lv2:`<p><strong>新增指标流程</strong>：</p><ol><li>在 <code class="inline">internal/observability/metrics.go</code> 定义指标变量</li><li>在 <code class="inline">init()</code> 中 <code class="inline">prometheus.MustRegister()</code></li><li>在业务代码中调用 <code class="inline">.Inc()</code> / <code class="inline">.Observe()</code> 记录数据</li><li>重启后 <code class="inline">/metrics</code> 自动输出</li></ol><p><strong>关键 PromQL 查询</strong>：</p><pre><code><span class="cm"># QPS by path</span>
rate(feedsystem_http_requests_total[1m])
<span class="cm"># P95 延迟</span>
histogram_quantile(0.95, rate(feedsystem_http_request_duration_seconds_bucket[5m]))
<span class="cm"># 熔断器开启频率</span>
rate(feedsystem_circuit_breaker_state_changes_total{to_state="open"}[1m])
<span class="cm"># 限流拒绝率</span>
rate(feedsystem_ratelimit_rejections_total[1m])</code></pre>`,
lv3:`<p><strong>Q: 为什么没有 Gauge 类型？</strong></p><p>业务上暂无需要实时查看的"瞬时值"场景。熔断器当前状态（Closed/Open/HalfOpen）理论上适合用 Gauge，但项目选择用 Counter 记录切换次数，能看到历史趋势。</p><p><strong>Q: label 值太多会怎样？</strong></p><p>每个唯一 label 组合是一个独立时间序列。如果 path 用实际 URL 而非模板，<code class="inline">/video/getDetail/1</code>、<code class="inline">/video/getDetail/2</code>... 会导致序列数爆炸，Prometheus 内存和存储急剧增长。</p>`},
{q:"熔断器怎么保护 Redis 调用？三态机怎么运作？",
lv1:`<p>Redis 网络抖动时，每个请求等 50ms 超时 → 连接池打满 → MySQL 也被压垮 → 雪崩。简单判 <code class="inline">if cache != nil</code> 只能处理"连不上"，处理不了"连得上但慢"。</p><p>熔断器的价值：识别"系统正在变差"，主动断流保护后端，给故障组件恢复时间。</p><p>三态机：</p><ul><li><strong>Closed</strong>：正常放行，统计连续失败</li><li><strong>Open</strong>：连续 5 次失败后直接拒绝，返回 ErrBreakerOpen</li><li><strong>HalfOpen</strong>：10s 后放 1 个探测请求，成功回 Closed，失败回 Open</li></ul>`,
lv2:`<p>基于 <code class="inline">sony/gobreaker v2</code>，封装为 Breaker 类型：</p><pre><code><span class="cm">// breaker.go — 核心 Execute 方法</span>
<span class="kw">func</span> (b *Breaker) Execute(fn <span class="kw">func</span>() error) error {
    <span class="kw">var</span> origErr error
    _, cbErr := b.cb.Execute(<span class="kw">func</span>() (<span class="kw">any</span>, error) {
        origErr = fn()
        <span class="cm">// redis.Nil 不计入失败</span>
        <span class="kw">if</span> origErr != <span class="kw">nil</span> &amp;&amp; IsMiss(origErr) {
            <span class="kw">return</span> <span class="kw">nil</span>, <span class="kw">nil</span>
        }
        <span class="kw">return</span> <span class="kw">nil</span>, origErr
    })
    <span class="cm">// 熔断器开启时返回 ErrBreakerOpen</span>
    <span class="kw">if</span> errors.Is(cbErr, gobreaker.ErrOpenState) {
        observability.CircuitBreakerRejections.Inc()
        <span class="kw">return</span> ErrBreakerOpen
    }
    <span class="kw">return</span> origErr  <span class="cm">// 透传 redis.Nil</span>
}</code></pre><p><strong>配置参数</strong>：</p><pre><code>MaxRequests:         1                  <span class="cm">// HalfOpen 放行 1 个探测</span>
Interval:            60 * time.Second   <span class="cm">// Closed 滚动窗口</span>
Timeout:             10 * time.Second   <span class="cm">// Open 持续时间</span>
ConsecutiveFailures: 5                  <span class="cm">// 触发阈值</span></code></pre><p><strong>全覆盖</strong>：所有 Redis 操作（cache.go/zset.go/set.go）均经 breaker 保护。</p>`,
lv3:`<p><strong>Q: 为什么 redis.Nil 不计入失败？</strong></p><p>缓存未命中只意味着回源 MySQL，是正常业务路径。如果计入，高并发下大量 cache miss 会误触熔断器。</p><p><strong>Q: IsBreakerOpen() 对 half_open 也返回 true，会不会过度降级？</strong></p><p>会。Pipeline 路径无法使用 Execute 封装，只能预检查状态。HalfOpen 探测期 Pipeline 也跳过 Redis，可能过度降级。这是 trade-off：宁可降级也不冒险。</p><p><strong>Q: 熔断器开启后系统还能用吗？</strong></p><p>能。ListLatest 检测到 ErrBreakerOpen 时调用 listLatestFromDB 直查 MySQL，Feed 流功能不中断。Worker 收到 ErrBreakerOpen 时 sleep 1s 再 Nack-requeue，避免空转。</p><p><strong>Q: Interval 60s 的意义？</strong></p><p>Closed 状态下 60s 内没有失败则计数清零。避免"一周失败 5 次但分布很稀疏"的误熔断。</p>`},
{q:"优化后的压测数据提升了多少？怎么验证优化效果？",
lv1:`<p>优化后在 200 并发下重新压测：</p><ul><li>comment/listAll 吞吐量从 5,846 提升到 <strong>20,220 req/s</strong>（+246%）</li><li>P95 从 29.1ms 降到 <strong>12.7ms</strong>（-56%），且并发翻倍</li><li>500 并发 50,000 请求 <strong>零 500 错误</strong></li><li>Redis 缓存命中率约 <strong>80%</strong></li></ul>`,
lv2:`<p><strong>comment/listAll 优化前后对比：</strong></p><pre><code>优化前 (100c, 5000n)      优化后 (200c, 20000n)
─────────────────         ───────────────────
5,846 req/s               20,220 req/s  (+246%)
P50: 11.4ms               P50: 4.9ms    (-57%)
P95: 29.1ms               P95: 12.7ms   (-56%)
P99: 135.8ms              P99: 34.5ms   (-75%)</code></pre><p><strong>video/getDetail 优化前后对比：</strong></p><pre><code>优化前 (混合 50c)         优化后 (独立 200c)
─────────────────         ───────────────────
P95: 189.4ms              P95: 6.7ms    (-96%)</code></pre><p><strong>Prometheus 全局指标：</strong></p><ul><li>HTTP 总 QPS: 368.5</li><li>Redis GET QPS: 294.8（缓存命中率 ~80%）</li><li>全链路 P95: 8.7ms</li><li>500 错误: 0</li></ul>`,
lv3:`<p><strong>Q: 优化后并发翻倍但 P95 更低，说明什么？</strong></p><p>说明 Redis 缓存 + 连接池调优的效果远超并发增加带来的压力。缓存命中后不需要查 MySQL，连接池复用减少了连接等待。</p><p><strong>Q: 缓存命中率 80% 怎么算的？</strong></p><p>Redis GET QPS (294.8) / HTTP 总 QPS (368.5) ≈ 80%。说明 80% 的请求命中了 Redis 缓存，不需要查 MySQL。</p><p><strong>Q: 500 并发下 P95 升到 35ms，还能优化吗？</strong></p><p>可以：1) 加更多 API 实例水平扩容 2) Redis Cluster 分片 3) MySQL 读写分离。单机 500 并发 14,422 req/s 已经是很好的水平。</p>`}

const interviewData=[{dim:"项目介绍话术",questions:[{q:"请介绍一下你的短视频 Feed 系统项目",a:"这是一个基于 Go + Gin + GORM + Redis + RabbitMQ 的短视频信息流后端系统。整体架构是 API + Worker 双进程模型，API 负责接收 HTTP 请求和返回结果，Worker 负责异步消费 MQ 消息做持久化。核心功能有五个：视频发布、点赞评论、关注关系、Feed 流浏览、热度排行。技术亮点方面：第一是三级缓存（L1 go-cache 3-5s + L2 Redis 1h + L3 MySQL），用 singleflight 防击穿；第二是 Outbox 模式保证写 DB 和发 MQ 的最终一致性；第三是冷热分离，ZSET 存最新 1000 条热数据，超出走 MySQL；第四是幂等消费，MySQL 1062 唯一键冲突静默忽略；第五是 MQ 降级，MQ 不可用时自动切同步 MySQL 事务。第六是推拉结合，普通用户（粉丝&lt;10000）发布时通过 FanoutMQ 推送到活跃粉丝收件箱（3天内登录过），大V不推送，读取时从发件箱拉取。读取路径做了四个优化：粉丝活跃度过滤（Pipeline EXISTS批量过滤僵尸粉）、公平提前终止（Pipeline批量探测所有大V活跃度）、拉取配额跳过冷大V（newestAt&lt;=inboxOldest）、活跃度优先拉取（按newestAt降序分配配额）、真正的k-way merge（堆大小=K，streamCursor迭代器），Redis RTT 不随大V数量增长。",code:"cmd/main.go, cmd/worker/main.go, internal/feed/service.go, internal/worker/fanoutworker.go",follow:"项目规模？你负责哪些模块？遇到的最大挑战？如何保证高可用？"}]},{dim:"Redis",questions:[{q:"缓存穿透、击穿、雪崩分别是什么？你的项目怎么解决的？",a:"这三个是经典的缓存问题。缓存穿透是查根本不存在的数据，缓存和 DB 都没有。项目用 EMPTY_DB 短路标记：查完 DB 发现为空，也往缓存写一个特殊值，下次直接返回。缓存击穿是热点 key 过期，大量并发涌向 DB。项目用 singleflight 做请求合并，同一个 key 的并发请求只有一个真正去查 DB，其他请求等待并共享结果。在 GetVideoByIDs 和 ListLatest 的冷查询路径上都有应用。缓存雪崩是大量 key 同时过期。项目用不同 TTL 错开：L1 3-5s、L2 1h、热度窗口 2h。",code:"internal/feed/service.go:GetVideoByIDs (singleflight), ListLatest (EMPTY_DB + singleflight)",follow:"singleflight 和分布式锁区别？EMPTY_DB 数据后来创建了怎么办？雪崩除了随机 TTL 还有什么方案？"},{q:"Redis 分布式锁怎么实现的？为什么解锁要用 Lua？",a:"加锁用 SET key random_token NX PX ttl，NX 保证互斥，PX 防死锁，random_token 标识持有者。解锁必须用 Lua 脚本，因为要保证 GET + 比较 + DEL 三步原子执行。如果不原子，可能出现：我 GET 发现 token 是我的，准备 DEL，但在这之间锁过期了，别人拿到了锁，我把别人的锁删了。Lua 脚本先 GET 比较 token，一致才 DEL，不一致返回 0，整个过程原子。",code:"internal/middleware/redis/redis.go:Lock (第84行), UnLock (第110行), unlockScript (第99行)",follow:"Redis 主从切换锁丢失？锁续期问题？其他分布式锁方案？"},{q:"ZSET 在你项目中的四个应用场景？",a:"第一个是时间线，key feed:global_timeline，score 是视频创建时间毫秒时间戳。第二个是热度窗口，key hot:video:1m:YYYYMMDDHHmm，每分钟一个窗口，score 是互动量。第三个是合并热榜，ZUNIONSTORE 合并 60 个窗口。第四个是推拉结合的收件箱和发件箱，inbox:{userID} 存推送视频（cap 500），user_videos:{authorID} 存作者最近视频（cap 50），读取时 k-way merge 归并。",code:"outboxworker.go:StartConsumer, popularity_cache.go, feed/service.go:ListByPopularity, fanoutworker.go:process, feed/service.go:ListByFollowing",follow:"ZSET 时间复杂度？inbox cap？概率裁剪？"},{q:"三级缓存架构怎么设计的？为什么需要 L1？",a:"L1 是 go-cache 本地缓存存在进程内存，默认 TTL 3 秒回写时 5 秒。L2 是 Redis 分布式缓存，TTL 1 小时。L3 是 MySQL 源数据。查询时先 L1 命中直接返回，没命中查 L2 命中写回 L1，L2 也没命中查 L3 异步回写 L2 同步写回 L1。需要 L1 是因为 Redis 虽然快但每次查询还有 0.5-1ms 网络往返，L1 在进程内存亚毫秒返回。对于热点数据如首页 Feed 流反复访问的视频详情，L1 能把 Redis QPS 压力降低 90%+。",code:"internal/feed/service.go:GetVideoByIDs, NewFeedService (cache.New(3*time.Second, 5*time.Second))",follow:"L1 一致性？go-cache 过期清理？多实例 L1 同步？"},{q:"singleflight 和分布式锁分别在什么场景用？",a:"singleflight 是 Go 标准库提供的单进程去重，并发请求只有一个执行其他共享结果。分布式锁用 Redis SETNX 跨实例去重。项目中防击穿主要靠 singleflight：GetVideoByIDs 用 singleflight 合并同 videoID 的并发请求（sf:entity:{id}），ListLatest 的冷查询和 ZSET 回源也用 singleflight，ListByFollowing 本身不用 singleflight，Redis 不可用时降级到 MySQL 子查询；下游 GetVideoByIDs 使用 singleflight 防击穿。分布式锁（Lock/UnLock）作为通用工具存在，供需要跨实例保护的场景使用。",code:"GetVideoByIDs 用 singleflight, ListLatest 用 singleflight, redis.go:Lock/UnLock",follow:"shared 返回值？锁持有者宕机？两种机制组合使用？"},{q:"Redis 和 MySQL 双写一致性怎么保证？",a:"采用最终一致性策略。视频详情：异步回写加 TTL 自然过期，MySQL 查询成功后 go func 异步写 Redis 1h TTL。热度缓存：事件驱动失效，点赞评论后主动 DEL 详情缓存再 ZINCRBY 更新分钟窗口。时间线：Outbox 模式，事务写 video+outbox 表，轮询器投递 MQ，消费者 ZADD 到 ZSET。总结：读路径靠缓存加 TTL 兜底，写路径靠主动失效加事件驱动更新。",code:"popularity_cache.go:UpdatePopularityCache, video_repo.go:PublishVideo, outboxworker.go",follow:"DEL 和更新 DB 之间有延迟？为什么不用 Canal？Cache Aside 模式？"},{q:"Lua 脚本在你项目中的两个用途？",a:"第一个是限流，Lua 把 INCR 和 PEXPIRE 合成原子操作。先 INCR key，如果 count 等于 1 就设置 PEXPIRE 过期时间，保证计数和过期设置原子。第二个是分布式锁解锁，Lua 把 GET+比较+DEL 合成原子操作。先 GET key 的值和传入 token 比较，一致才 DEL，不一致返回 0。Redis 单线程模型下 Lua 脚本内所有命令原子执行中间不会被其他命令插入。",code:"redis.go:incrementWithExpireScript (第48行), unlockScript (第99行)",follow:"Lua 会阻塞其他命令？执行时间过长？其他保证原子性方式？"},{q:"Redis 为什么这么快？",a:"三个原因：单线程事件循环避免锁竞争和上下文切换、内存存储纳秒级访问、IO 多路复用 epoll/kqueue 单线程处理万级连接。ZSET 底层用跳表加哈希表，跳表支持 O(log N) 范围查询。Redis 6.0 引入多线程 IO 但命令执行仍是单线程。",code:"internal/middleware/redis/目录",follow:"Redis 6.0 多线程 IO？单线程利用多核？Redis vs Memcached？"},{q:"Redis 持久化 RDB vs AOF？",a:"RDB 是快照恢复快但可能丢最后一次快照后的数据。AOF 是日志更安全但文件大恢复慢。本项目 ZSET 可以从 MySQL 重建，RDB 够用。如果 Redis 丢了数据，singleflight 触发从 MySQL 重建 ZSET。",code:"internal/feed/service.go:ListLatest (ZSET 为空时 singleflight 重建)",follow:"AOF 重写？混合持久化？RDB fork 影响性能？"},{q:"限流的 Lua 脚本为什么必须原子执行？",a:"防止 INCR 成功但 PEXPIRE 未执行导致 key 永不过期，该 IP 或用户被永久限流。Lua 在 Redis 单线程中原子执行保证这两个操作要么都成功要么都失败。",code:"redis.go:incrementWithExpireScript, ratelimit.go:Limit",follow:"key 被手动删了？固定窗口缺点？令牌桶 vs 漏桶？"}]},{dim:"消息队列",questions:[{q:"为什么要用消息队列？",a:"三个原因：解耦让 API 和持久化分离互不影响、异步让 API 快速返回不等 MQ 处理完、削峰让点赞突发流量被缓冲不至于压垮 DB。项目用 5 个 Topic Exchange 分别承载 like、comment、social、popularity、timeline 事件。",code:"likeMQ.go, socialMQ.go, likeworker.go",follow:"MQ 带来什么问题？什么场景不适合？RabbitMQ vs Kafka？"},{q:"如何保证消息不丢失？",a:"三层保障：Producer 端消息设为 Persistent delivery_mode=2 写入磁盘、Broker 端 durable exchange 加 durable queue 重启不丢失、Consumer 端手动 Ack/Nack 处理成功才 Ack 处理失败 Nack 重新入队。",code:"likeworker.go:Run (manual Ack), rabbitmq.go (durable exchange+queue)",follow:"Nack 一直重试？镜像队列？持久化性能影响？"},{q:"如何保证消息不重复消费？",a:"幂等消费用数据库唯一索引。Worker 在事务内调用 LikeIgnoreDuplicateInTx 插入点赞记录，遇到 1062 唯一键冲突直接返回 created=false 静默忽略。created=true 才在同一事务内更新计数和热度，created=false 跳过。事务保证 INSERT+UPDATE 原子执行，避免部分成功导致数据不一致。At-least-once 加幂等消费等于效果上 Exactly-once。",code:"likeworker.go:applyLike (事务), like_repo.go:LikeIgnoreDuplicateInTx",follow:"不适合加唯一索引？其他幂等方式？消息体带唯一 ID？"},{q:"什么是 Outbox 模式？",a:"解决写 DB 和发 MQ 不能原子的问题。事务写 video+outbox 表（含 AuthorID），轮询器每秒扫描 pending 记录双投递：先投递 TimelineMQ（写全局时间线），成功后投递 FanoutMQ（推送到粉丝收件箱），两者都成功才删除 outbox 记录。",code:"video_repo.go:PublishVideo, outboxworker.go:StartOutboxPoller (双投递), fanoutMQ.go",follow:"轮询延迟控制？vs CDC Debezium？双投递顺序？"},{q:"MQ 不可用时系统怎么降级？",a:"MQ 优先加同步降级。LikeMQ 失败时降级到同步 MySQL 事务执行 LikeInTx 加 ChangeLikesCount 加 ChangePopularity。PopularityMQ 失败时直接调用 UpdatePopularityCache 更新 Redis。核心数据不丢只是 API 变慢。",code:"like_service.go:Like (likeMQSent/popularityMQSent 标记)",follow:"降级后性能影响？MySQL 也挂了？监控 MQ 可用性？"},{q:"RabbitMQ Exchange 类型有哪些？",a:"Direct 精确匹配 routing key、Fanout 广播到所有绑定队列、Topic 通配符匹配星号匹配一个词井号匹配零或多词本项目用的、Headers 很少用按消息头匹配。",code:"likeMQ.go, socialMQ.go (Topic Exchange 声明)",follow:"Topic vs Direct 性能？绑定很多队列？死信队列？"},{q:"At-least-once vs At-most-once vs Exactly-once？",a:"At-most-once 可能丢消息性能最好。At-least-once 不丢但可能重复本项目用的。Exactly-once 不丢不重实现极难。用 At-least-once 加幂等消费达到效果上 Exactly-once。",code:"likeworker.go:Run+applyLike",follow:"Kafka Exactly-once？幂等 Producer？事务消息？"},{q:"Outbox 轮询 vs CDC？",a:"轮询简单无额外依赖有延迟当前 1 秒。CDC 如 Debezium 延迟低毫秒级但需要额外部署增加运维复杂度。本项目每秒轮询 1 秒延迟可接受。",code:"outboxworker.go:StartOutboxPoller",follow:"Outbox 表膨胀？Debezium 影响 MySQL 性能？其他 CDC 工具？"}]},{dim:"Feed 流设计",questions:[{q:"推拉结合怎么实现的？",a:"普通用户（粉丝&lt;10000）发布时 FanoutMQ 推送到粉丝 inbox ZSET，大V（>=10000）不推送。FanoutWorker 写 user_videos 发件箱后判断粉丝数，过滤活跃粉丝（3天内登录过，user:active:{id} TTL 72h），只推活跃粉丝，僵尸粉走拉路径兜底。读取时并行读 inbox+bigV 列表，Pipeline 批量探测所有大V活跃度取 max(newestAt)，跳过冷大V（newestAt<=inboxOldest），按活跃度降序分配拉取配额，真正的 k-way merge 归并（堆大小=K，streamCursor 迭代器）。Redis RTT 不随大V数量增长。",code:"fanoutworker.go:process, filterActiveFollowers, feed/service.go:ListByFollowing, mergeAndDedup, socialworker.go:onFollow",follow:"大V阈值？取关后inbox清理？k-way merge复杂度？公平提前终止？"},{q:"冷热分离怎么做的？",a:"ZSET 保留最新 1000 条视频最老的 score 作为 watermark。reqTime 大于 watermark 走 Redis 热查询用 ZREVRANGEBYSCORE 分页。reqTime 小于等于 watermark 走 MySQL 冷查询。热数据不足时补冷尾用最后一条的 create_time 作为冷查询起点。冷数据不回写 ZSET 防污染热点。",code:"feed/service.go:ListLatest (第41行), outboxworker.go:StartConsumer (ZADD+裁剪)",follow:"watermark 变化？1000 条够吗？冷数据回写问题？"},{q:"游标分页 vs offset 分页？",a:"offset 大偏移 O(N) 需要扫描前 N 条再跳过且数据变化导致错位。游标 O(log N+limit) 利用索引直接定位且稳定。项目三种游标：时间游标 create_time、双字段 likes_count 加 id 解决并列、三字段 popularity 加 create_time 加 id。",code:"ListLatest, ListLikesCount, ListByPopularity",follow:"游标缺点？为什么需要多字段？跳到第 N 页？"},{q:"热度排行怎么实现的？",a:"实时更新用 ZINCRBY 更新分钟窗口 hot:video:1m:。查询合并用 ZUNIONSTORE 按时间衰减加权合并过去 60 个窗口（decay=0.95，越老权重越小）。稳定分页用 as_of 加 offset 保证同一批次基于同一快照。降级方案 MySQL 三字段游标。",code:"popularity_cache.go, feed/service.go:ListByPopularity (第305行)",follow:"为什么 60 个窗口？ZUNIONSTORE 时间复杂度？热度衰减？"},{q:"三字段游标怎么处理并列？",a:"popularity 加 create_time 加 id 三重排序。WHERE 条件用 OR 连接三种情况：popularity 小于、popularity 相等且 create_time 小于、popularity 相等且 create_time 相等且 id 小于。id 自增保证唯一做最终 tiebreaker。",code:"feed/repo.go:ListByPopularity",follow:"不用 id 做第三字段？WHERE 条件能用索引？四字段游标？"},{q:"为什么冷数据不回写 ZSET？",a:"防污染热点时间线 ZSET 只保留最新 1000 条。冷数据流量极小 MySQL 索引够用。如果回写会导致 ZSET 膨胀失去热缓存意义。",code:"feed/service.go:ListLatest 第110行注释",follow:"频繁翻到冷数据？冷数据单独建 ZSET？监控冷热比例？"},{q:"SoftJWTAuth 的设计思路？",a:"公共接口可选认证。有 token 时解析身份写入 context 获取 accountID 用于查 is_liked。没有 token 也放行 accountID 设为 0 is_liked 全 false。token 格式错误才拦截 401。",code:"jwt.go:SoftJWTAuth (第92行), router.go (feedGroup), feed/service.go:buildFeedVideos",follow:"token 无效时处理？按什么 key 限流？其他 SoftJWTAuth 场景？"},{q:"如何支持亿级用户？",a:"MySQL 分库分表加 Redis Cluster 加 API 水平扩容加 RabbitMQ 集群或换 Kafka 加 CDN 视频。已实现推拉结合，可通过调整大V阈值优化 fanout 范围。Worker 独立扩缩容。",code:"cmd/main.go, cmd/worker/main.go",follow:"分库后全局唯一 ID？跨分片查询？Redis Cluster 数据迁移？"},
{q:"推拉结合的读取路径怎么优化的？",a:"七个优化：粉丝活跃度过滤（只推3天内登录过的粉丝，Pipeline EXISTS批量过滤）、并行读取（inbox+bigV goroutine 并行，2RTT→1RTT）、公平提前终止（Pipeline批量查所有大V最新时间戳取max，非只采样1个）、跳过冷大V（newestAt<=inboxOldest的大V不分配配额）、活跃度优先拉取（按newestAt降序分配配额，最活跃大V优先）、Pipeline批量（探测+拉取合并为1次RTT）、真正的k-way merge（堆大小=K，streamCursor迭代器+mergeHeap）。",code:"feed/service.go:ListByFollowing, mergeAndDedup, fanoutworker.go:filterActiveFollowers",follow:"旧采样问题？活跃度vs均匀分配？Pipeline失败降级？inbox为空？"},
{q:"k-way merge 怎么实现的？",a:"用 container/heap 实现真正的 k-way merge，堆大小=流数量 K。数据结构：streamCursor 迭代器（peek/advance）、mergeItem（video+cursor引用）、mergeHeap（heap.Interface）。流程：每个流第一个元素入堆→弹出最大→去重→从同一流advance取下一个入堆→重复。O(N log K) 时间，O(K) 空间。旧实现把所有元素拍扁建堆（堆大小=N），丢失了已排序结构性质。",code:"feed/service.go:mergeAndDedup, streamCursor, mergeItem, mergeHeap",follow:"堆大小为什么是K不是N？去重数据结构？大V发件箱为空？"}]},{dim:"系统设计",questions:[{q:"设计一个短视频信息流系统",a:"上传走 OSS。发布用 Outbox 模式双投递 TimelineMQ+FanoutMQ，FanoutWorker 写发件箱+推inbox。浏览用推拉结合加冷热分离加三级缓存。互动用 MQ 优先加同步降级加幂等消费。认证用 JWT 加 Redis 吊销。限流用 Lua 脚本固定窗口。",code:"cmd/main.go, router.go, feed/service.go, fanoutworker.go, like_service.go",follow:"视频转码？推荐算法？内容审核？"},{q:"点赞数实时更新如何设计？",a:"API 投递两条 MQ：LikeMQ 负责点赞记录、PopularityMQ 负责热度更新。Worker 消费后 MySQL 原子更新用 GREATEST 防负数加 Redis 热度更新 ZINCRBY。MQ 失败降级同步事务。幂等消费用唯一索引 1062。",code:"like_service.go:Like, likeworker.go:applyLike, video_repo.go:ChangeLikesCount",follow:"为什么用 MQ？GREATEST 防什么？并发更新精度？"},{q:"如何处理热门视频的流量突增？",a:"限流 KeyByAccount 30 次每分钟防恶意刷赞。singleflight 合并并发请求。L1 本地缓存 3-5s 减少 Redis 压力。降级 Redis 挂了走 MySQL。singleflight 防缓存击穿。",code:"router.go (likeLimiter), GetVideoByIDs, like_service.go",follow:"限流触发后用户体验？singleflight 超时？MySQL 也扛不住？"},{q:"如果流量增大 10 倍？",a:"API 水平扩容加 Nginx 负载均衡。Redis Cluster 分片。MySQL 读写分离或分库分表。RabbitMQ 集群或换 Kafka。CDN 加速视频。推拉结合替代纯拉模型。Worker 独立扩缩容。",code:"",follow:"灰度发布？分库中间件？容量评估？"},{q:"CAP 理论？你的系统偏向哪个？",a:"偏向 AP 最终一致性加高可用。Redis 缓存短暂不一致最多延迟 5 秒。Outbox 秒级延迟保证最终一致。MQ 降级保可用。GREATEST 容忍不一致。核心设计：可用性优先一致性兜底。",code:"like_service.go, video_repo.go:PublishVideo",follow:"什么场景用 CP？Raft vs Paxos？监控一致性延迟？"},{q:"分布式 ID 生成方案？",a:"当前 randToken random hex 无序。建议 Snowflake 时间有序 64 位或 UUID v7 或 Leaf 号段模式。Snowflake 结构：1 位符号+41 位时间戳+10 位机器+12 位序列号。",code:"redis.go:randToken (第76行)",follow:"Snowflake 时钟回拨？ID 长度对索引影响？自增 ID 分布式问题？"}]},{dim:"Go 语言与工程",questions:[{q:"singleflight 的原理？",a:"内部维护一个 map，key 对应一个 call 结构体。相同 key 并发请求只有一个执行函数，其他等待并共享结果。shared=true 表示搭便车。执行完成后所有等待者同时收到结果。",code:"GetVideoByIDs, ListLatest",follow:"map 内存泄漏？vs errgroup？panic 了怎么办？"},{q:"Go 中 context 的作用？",a:"三个作用：取消传播父 context 取消子 context 自动取消、超时控制 WithTimeout 自动取消、值传递 WithValue 传递请求级数据。Redis 操作用独立 context 50ms 超时不依赖请求 context 避免被取消。",code:"popularity_cache.go (独立 context 50ms), GracefulShutdown",follow:"context.WithValue 的 key 类型？内存泄漏？context.AfterFunc？"},{q:"WaitGroup 和 Mutex 的使用场景？",a:"WaitGroup 等待 goroutine 完成用于并行扇出查询。Mutex 保护共享资源如 videoMap 并发写入。本项目 GetVideoByIDs 用 WaitGroup 等待所有查询 goroutine 完成用 Mutex 保护 videoMap 写入。",code:"GetVideoByIDs (第480行)",follow:"WaitGroup vs channel？sync.Map？RWMutex？"},{q:"Gin 中间件执行顺序？",a:"按注册顺序执行。c.Next() 传递到下一个中间件。c.Abort() 终止链路。限流超限 AbortWithStatusJSON 429。JWT 认证失败 Abort 401。SoftJWTAuth 无 token 时 Next 放行。",code:"ratelimit.go:Limit, jwt.go:JWTAuth, router.go",follow:"c.Next() 和 c.Set() 顺序？后置逻辑？路由树组织？"},{q:"GORM 事务使用方式？",a:"db.Transaction(func(tx)error{}) 自动 commit/rollback。Service 通过 repo.Transaction 获取 tx 调用 InTx 方法。ChangeLikesCount 接受 tx 参数非事务时传 nil 自动降级为 r.db。",code:"like_service.go, video_repo.go:ChangeLikesCount, PublishVideo",follow:"隔离级别？嵌套事务？大事务问题？"},{q:"Go 错误处理哲学？",a:"错误是值显式返回检查 err!=nil。errors.Is 判断错误类型。errors.As 提取特定错误类型。项目中 isDuplicateKey 用 errors.As 提取 mysql.MySQLError 判断 1062。",code:"like_service.go, like_repo.go:isDuplicateKey",follow:"error wrapping？panic vs error？自定义错误类型？"},{q:"优雅停机怎么实现？",a:"API 用 signal.Notify 监听 SIGTERM 加 http.Server.Shutdown 5 秒超时等待活跃请求完成。Worker 用 signal.NotifyContext 传播取消信号到所有 Worker goroutine 加 errCh 收集错误。",code:"router.go:GracefulShutdown, cmd/worker/main.go (signal.NotifyContext)",follow:"MQ 消费处理？K8s preStop？测试优雅停机？"},{q:"Dockerfile 多阶段构建的好处？",a:"编译阶段用 golang 镜像编译二进制。运行阶段用 alpine 最小镜像只复制二进制。好处：最终镜像小只有几十 MB、安全性好没有编译工具链、构建独立不依赖宿主机 Go 环境。api 和 worker 两个 target。",code:"backend_repeat/Dockerfile",follow:"scratch vs alpine？减小 Go 二进制体积？Docker 层缓存？"}]},{dim:"认证与安全",questions:[{q:"JWT 的组成？",a:"Header 包含算法 HS256 和类型 JWT。Payload 包含 account_id、username、exp 过期时间、iat 签发时间、nbf 生效时间。Signature 用 HMAC-SHA256 对 Header+Payload 签名防篡改。HS256 对称密钥 vs RS256 非对称密钥。",code:"auth/jwt.go:GenerateToken (第41行), ParseToken (第56行)",follow:"Payload 放敏感数据？过期时间设多长？JWT vs OAuth2？"},{q:"JWT vs Session？",a:"JWT 无状态水平扩展好但不能主动吊销。Session 有状态可主动失效但需要共享存储。本项目 JWT 加 Redis Token 存储实现吊销：登录时存 Redis 每次请求比对不一致即吊销。",code:"auth/jwt.go, jwt.go:check",follow:"JWT 续期？Refresh Token？分布式 Session？"},{q:"如何实现 JWT 吊销？",a:"Redis 存 token key 为 account:{id}。每次请求 check 函数先查 Redis 比对 token。不一致返回 401 token has been revoked。Redis 异常降级 MySQL 查 account 表的 token 字段。退出时删除 Redis key。",code:"jwt.go:check (第46行), account/service.go (Login 时存 Redis)",follow:"多设备登录？Token 黑白名单？踢掉其他设备？"},{q:"什么是 TOCTOU？",a:"Time-of-Check to Time-of-Use 检查到使用之间的竞态窗口。点赞不预检查依赖唯一索引消除窗口。关注保留预检查加 uniqueIndex 兜底属于用户体验优先给用户友好提示 already followed。",code:"like_service.go:Like, social/service.go:Follow",follow:"唯一索引 vs 乐观锁？其他防重方式？version 字段？"},{q:"bcrypt 的原理？",a:"基于 Blowfish 加密算法。自带随机 salt 防彩虹表。计算慢约 100ms 防暴力破解。可调 cost 参数默认 10 每增加 1 计算时间翻倍。MD5/SHA256 太快每秒数十亿次不适合密码。",code:"account/service.go",follow:"cost 参数选多大？argon2 vs bcrypt？SHA256+salt 为什么不行？"}]},{dim:"场景题与开放题",questions:[{q:"如果 Redis 挂了？",a:"缓存降级 L1 在加 L3 兜底直接查 MySQL。singleflight 在进程内仍然有效同实例并发请求会合并。限流失效 fail-open 放行。Token 吊销降级 MySQL 查询。核心功能可用但性能下降。",code:"redis.go (nil check), jwt.go:check (MySQL 降级), ratelimit.go",follow:"监控 Redis？集群单节点挂？Redis 高可用？"},{q:"如果 RabbitMQ 宕机？",a:"自动降级同步路径 likeMQSent=false 走同步 MySQL 事务。Outbox 轮询器持续重试 MQ 恢复后自动补发。影响 API 变慢但数据不丢。",code:"like_service.go:Like, outboxworker.go, cmd/main.go (rbq=nil)",follow:"监控 MQ？积压消息处理？消息乱序？"},{q:"限流算法的缺点？",a:"固定窗口临界问题窗口边界突发 2x 流量。改进：滑动窗口用 ZSET 存时间戳、滑动窗口计数器当前加上一窗口加权、令牌桶允许突发、漏桶平滑流量。",code:"ratelimit.go, redis.go:incrementWithExpireScript",follow:"令牌桶 vs 漏桶？分布式限流？拒绝状态码？"},{q:"如何监控系统健康？",a:"pprof 看 CPU 内存 goroutine。Redis Ping 检测连接。RabbitMQ 管理界面看队列积压。日志记录错误。进一步 Prometheus 加 Grafana 加 Jaeger 加告警。",code:"observability/pprof.go, cmd/main.go",follow:"pprof profile 类型？goroutine 泄漏？Prometheus 四种 Metric？"},{q:"如果重新设计，你会改什么？",a:"分布式 ID 用 Snowflake 替代 random hex。JWT 用 access 加 refresh token 分离。限流用滑动窗口替代固定窗口。CDC 用 Debezium 替代 Outbox 轮询。Redis Cluster 替代单机。加死信队列处理毒消息。",code:"redis.go:randToken, auth/jwt.go, ratelimit.go, outboxworker.go",follow:"改进优先级？线上改动保证？其他优化？"}]},{dim:"可观测性与性能优化",questions:[{q:"你的项目怎么做的可观测性？用了什么工具？",a:"接入 Prometheus 加 Grafana 做全链路监控。Gin middleware 自动采集 HTTP QPS 和延迟分位数，自定义埋点覆盖 Redis 操作延迟和 RabbitMQ 消息吞吐。Grafana 做了 8 面板 Dashboard 包括 HTTP QPS、状态码分布、P50/P95/P99 延迟、Redis 操作 QPS 和延迟、MQ 发布消费速率。用 hey 做压力测试验证极限性能。",code:"observability/middleware.go (Gin middleware), observability/metrics.go (指标定义), configs/prometheus.yml, configs/grafana/",follow:"Prometheus 四种指标类型？为什么用 FullPath？/metrics 端点怎么暴露？"},{q:"Prometheus 的工作原理是什么？Pull 和 Push 的区别？",a:"Prometheus 是 Pull 模型，每隔 15 秒主动来服务的 /metrics 端口拉取数据。服务只需要把指标放到内存里暴露一个 HTTP 端口就行。Push 模型是服务主动推数据到 Pushgateway。Pull 适合长期运行的服务，Push 适合短生命周期的批处理任务。本项目用 Pull，Prometheus 每 15 秒 scrape 一次 backend:8080/metrics。",code:"configs/prometheus.yml (scrape_configs), internal/http/router.go (GET /metrics)",follow:"scrape_interval 怎么配？Targets 状态怎么看？Prometheus 存储原理？"},{q:"压测发现了什么瓶颈？怎么定位的？",a:"接入 Prometheus 后用 hey 压测对比不同接口延迟。发现 comment/listAll 的 P95 是 29.1ms 而 feed/listLatest 只有 1.1ms 差 22 倍。通过 Prometheus 指标对比加源码分析定位到两个瓶颈：comment 每次请求打 2 次 MySQL 且无缓存，MySQL 连接池用默认配置 MaxIdleConns 只有 2 高并发下连接等待严重。",code:"internal/video/comment_service.go (无缓存), internal/db/db.go (连接池默认配置)",follow:"怎么用 Prometheus 定位瓶颈？MaxIdleConns 太小有什么问题？"},{q:"分页缓存方案是怎么迭代的？整体缓存有什么问题？",a:"一开始想用整体缓存把整个评论列表缓存为一个 key。分析后发现三个问题：500 条评论等于 50KB JSON 序列化开销大、缓存失效时全量回查 MySQL 高并发下反而更差、前端只需 20 条但返回全部 500 条。改成分页缓存 Key 带 page 和 size 参数 Value 从 50KB 降到 2KB，每次失效只影响单页不会触发全量查询。",code:"internal/video/comment_service.go:GetAll (分页缓存逻辑)",follow:"为什么 TTL 选 30 秒？为什么只失效第 1 页？分页缓存缺点？"},{q:"MySQL 连接池四个参数怎么选？为什么这么配？",a:"MaxOpenConns 等于 100 留 51 给系统因为 MySQL 默认 max_connections 等于 151。MaxIdleConns 等于 25 是最大连接的四分之一平衡内存和复用。ConnMaxLifetime 等于 5 分钟定期回收避免使用过期连接。ConnMaxIdleTime 等于 3 分钟空闲连接回收释放资源。优化前默认 MaxOpenConns 等于 0 无限制会打爆 MySQL，MaxIdleConns 等于 2 大多数请求要新建连接。",code:"internal/db/db.go (连接池配置)",follow:"MaxOpenConns 设为 0 有什么问题？ConnMaxLifetime 和 ConnMaxIdleTime 区别？"},{q:"优化后压测数据提升了多少？",a:"comment/listAll 吞吐量从 5846 提升到 20220 req/s 正 246%。P95 从 29.1ms 降到 12.7ms 负 56% 且并发翻倍。video/getDetail 的 P95 从 189ms 降到 6.7ms 负 96% 连接池调优效果。500 并发 5 万请求零 500 错误。Redis 缓存命中率约 80%。Prometheus 全局指标 HTTP 总 QPS 368.5 全链路 P95 8.7ms。",code:"docs/optimization-report.md, docs/stress-test.md",follow:"缓存命中率怎么算的？500 并发还能优化吗？"},{q:"Redis 和 MQ 的自定义埋点怎么做的？",a:"Redis 埋点在 cache.go 的 Get Set Del 方法里记录操作类型和耗时。MQ 发布埋点在 PublishJSON 成功后 Inc()。MQ 消费埋点在 Worker 的 handleDelivery Ack 后调 IncrConsumed()。所有埋点都是内存操作不影响业务性能，失败只丢监控数据不影响业务。",code:"internal/middleware/redis/cache.go (Redis 埋点), internal/middleware/rabbitmq/rabbitmq.go (MQ 埋点)",follow:"为什么 Redis 埋点记录耗时不只计数？埋点失败影响业务吗？"},{q:"Gin Middleware 怎么自动采集 HTTP 指标？",a:"MetricsMiddleware 在请求开始时 time.Now() 记录时间，c.Next() 让请求继续执行，结束后 time.Since 算耗时。用 c.FullPath() 获取路由模板如 /video/getDetail 而非实际路径避免 label 爆炸。Counter 记录请求计数 Histogram 记录延迟分布。注册到 router.go 最前面确保所有请求都被采集。",code:"observability/middleware.go, http/router.go (r.Use)",follow:"为什么用 FullPath？c.Next() 前后包含什么？/metrics 自身会被采集吗？"},{q:"你的项目怎么做压力测试的？",a:"用 curl 脚本模拟真实 API 调用覆盖 24 个接口包括注册登录发布视频点赞评论关注。然后用 hey 做高并发压测分 5 组：200c 读、200c 读、500c 极端读、200x3 混合并行、100c 写操作限流验证。每组压测后等 Prometheus scrape 一轮采集数据。最终汇总到 stress-test.md。",code:"docs/stress-test.md",follow:"hey 工具怎么用？为什么用 curl 先模拟？测试矩阵怎么设计？"},{q:"如果重新设计可观测性，你会改什么？",a:"加链路追踪 Jaeger 跟踪请求在 API 和 Worker 间的流转。加结构化日志 zerolog 替代 log.Printf 方便 ELK 分析。加告警规则 Prometheus AlertManager 错误率超阈值通知。补全所有 Worker 的消费埋点。加自定义业务指标如视频发布量、点赞量。",code:"observability/metrics.go, cmd/main.go",follow:"Jaeger 原理？结构化日志好处？告警规则怎么写？"},{q:"熔断器三态怎么转换？为什么 HalfOpen 失败要立即回 Open？",a:"三态：Closed（正常放行统计失败）→ Open（直接拒绝）→ HalfOpen（放行探测请求）。连续 5 次失败触发 Closed→Open，10s 后自动进入 HalfOpen 放 1 个探测请求。探测成功→Closed，探测失败→立即回 Open。HalfOpen 失败立即回 Open 是因为后端还没恢复，继续放流量只会再次拖垮它。项目用 sony/gobreaker v2 实现，关键设计：redis.Nil 不计入失败（缓存未命中是正常回源不是故障）。",code:"internal/middleware/redis/breaker.go:Execute, breaker_test.go",follow:"5 次阈值怎么定？太敏感会怎样？熔断器和限流器区别？Interval 参数作用？"},{q:"固定窗口 vs 滑动窗口限流？边界突刺怎么解决？",a:"固定窗口用 INCR+PEXPIRE 简单但有边界突刺：窗口交界处 2 秒内可达 2× 限流值。滑动窗口用 ZSET+Lua 脚本：ZREMRANGEBYSCORE 清理过期→ZCARD 计数→ZADD 记录，整段 Lua 原子执行。ZSET 里始终只有过去 window 时间内的请求，任意时刻窗口内严格不超 limit。代价：O(limit) 内存 + Lua 脚本内部 4 条命令但客户端只有 1 次网络往返（1 次 EVAL）vs 固定窗口 1 条。项目保留两套：登录用固定窗口（低频简单），点赞用滑动窗口（高频严格）。",code:"internal/middleware/ratelimit/sliding_window.go, sliding_window_test.go:TestSlidingWindowNoBoundaryBurst",follow:"ZSET member 为什么用纳秒？令牌桶 vs 漏桶？Lua 脚本阻塞 Redis？集群模式 slot 限制？"},{q:"Redis 抖动时你的系统怎么表现？熔断器怎么保护？",a:"没有熔断器时：Redis 每次响应 200ms 超时，所有请求都要等→连接池打满→MySQL 也被压垮→雪崩。有熔断器后：连续 5 次超时→Breaker 切到 Open→后续请求直接返回 ErrBreakerOpen（微秒级）→上层走降级路径直查 MySQL→CPU 和连接数稳定。10s 后自动探测，Redis 恢复则切回 Closed 恢复缓存路径。Prometheus 指标 circuit_breaker_state_changes{to_state=open} 的 rate 可以判断 Redis 抖动频率。",code:"internal/middleware/redis/breaker.go, cache.go + zset.go + set.go (所有操作接入熔断), cache.go:IsBreakerOpen (Pipeline预检查)",follow:"熔断期间 MySQL 能扛住吗？多个服务共享 Redis 怎么协调熔断？"}]},{dim:"深度追问",questions:[{q:"你的系统怎么保证数据最终一致性？如果中间某个环节失败了呢？",a:"三层保证：Outbox 模式保证写 DB 和发 MQ 原子性（事务写 video+outbox 表）；At-least-once+幂等消费保证消息不丢不重（唯一索引 catch 1062）；缓存 TTL+主动失效保证读到的数据最终正确。失败场景：Outbox 投递成功 DELETE 失败→重复投递→消费者幂等忽略；Worker crash→消息未 Ack→RabbitMQ 重投→幂等消费；Redis DEL 失败→TTL 到期自然淘汰。",code:"video_repo.go:PublishVideo, outboxworker.go, likeworker.go:applyLike",follow:"最终一致性的'最终'是多久？强一致性怎么改造？Saga vs Outbox？"},{q:"Redis 集群模式下，你的 Lua 脚本还能用吗？",a:"能。我们的三个 Lua 脚本（限流 INCR+PEXPIRE、解锁 GET+DEL、滑动窗口 ZREMRANGEBYSCORE+ZCARD+ZADD+PEXPIRE）都是单 key 操作，天然兼容 Cluster。Redis Cluster 要求 Lua 涉及的所有 key 在同一个 slot，多 key 操作需要用 Hash Tag 保证。ZUNIONSTORE 合并 60 个窗口需要 Hash Tag 如 hot:video:1m:{video}:202605061435。",code:"redis.go:incrementWithExpireScript, unlockScript, sliding_window.go:slidingWindowScript",follow:"Hash Tag 数据倾斜？slot 迁移中 Lua 怎样？应用层拆分？"},{q:"你的三级缓存在多实例部署下有什么一致性问题？",a:"L1 本地缓存进程内不共享。实例 A 更新数据 DEL Redis 后，实例 B 的 L1 还有旧数据（3-5s TTL 内）。容忍度：Feed 流不是强一致场景，5 秒延迟可接受。更强一致性方案：Redis Pub/Sub 广播失效、版本号比较、缩短 TTL。选择容忍是因为 Feed 流用户刷新即可看到最新。",code:"feed/service.go:GetVideoByIDs (L1 go-cache)",follow:"电商库存能用 L1 吗？Pub/Sub Cluster 限制？go-cache 有 LRU 吗？"},{q:"你的 Worker 消费速度跟不上生产速度怎么办？",a:"短期：增加 Worker 实例（无状态直接加机器，RabbitMQ round-robin 分发）、调大 prefetchCount。中期：批量处理（攒 100 条一次 INSERT）、goroutine pool 并行消费（注意同 video_id 不能并行）。长期：换 Kafka（partition 模型天然水平扩展）。MQ 本身是缓冲区，允许短时积压。",code:"cmd/worker/main.go (prefetchCount=50), likeworker.go:Run",follow:"积压消息过时怎么处理？多 Worker 消息顺序？RabbitMQ vs Kafka 消费模型？"},{q:"如果数据库连接池打满了，系统会怎样？你怎么排查？",a:"现象：P99 飙升到几百毫秒。排查：Prometheus HTTP P95 突增+Redis 正常→瓶颈在 MySQL；SHOW PROCESSLIST 看活跃连接数；pprof goroutine 看是否阻塞在 database/sql.(*DB).conn。配置：MaxOpenConns=100（MySQL 默认 151 留 51 给系统）、MaxIdleConns=25、ConnMaxLifetime=5min。",code:"internal/db/db.go (连接池配置)",follow:"MaxIdleConns 太大？ConnMaxLifetime 为什么要设？3 个实例各 100 连接 MySQL 够吗？"},{q:"你的项目有哪些单点故障？怎么消除？",a:"MySQL 主库（主从+自动 failover）、Redis 单实例（Sentinel/Cluster）、RabbitMQ 单节点（镜像队列+集群）、API/Worker 单实例（多实例+LB）。当前容错：Redis 不可用降级 MySQL、MQ 不可用同步写、Worker crash 消息重投。未消除：MySQL 主库是真正单点，Outbox 轮询器只有一个实例。",code:"cmd/main.go, cmd/worker/main.go",follow:"MySQL 主从切换事务？双主风险？零停机部署？"}]},{dim:"高频追问速查表",questions:[]}];

let S={mode:'learn',ch:0,sec:0,topic:0,dim:0,q:'',timer:null,secs:0,running:false};

const P=()=>{try{return JSON.parse(localStorage.getItem('sp')||'{}')}catch{return{}}};
const save=(p)=>localStorage.setItem('sp',JSON.stringify(p));
const getT=()=>localStorage.getItem('st')||'light';
const setT=(t)=>{localStorage.setItem('st',t);document.documentElement.setAttribute('data-theme',t);document.getElementById('themeIcon').textContent=t==='dark'?'☀':'☽'};

function toggleTheme(){setT(getT()==='light'?'dark':'light')}
function switchMode(m){
  S.mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  render();
}
function handleSearch(v){S.q=v.trim().toLowerCase();render()}
function hl(t,q){if(!q)return t;return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>')}
function strip(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent||''}

/* ═══════════ RENDER ═══════════ */
function render(){
  const app=document.getElementById('app');
  if(S.q){renderSearch(app);updateProg();return}
  if(S.mode==='learn')renderLearn(app);
  else if(S.mode==='interview')renderInterview(app);
  else renderScenario(app);
  updateProg();
}

function updateProg(){
  const p=P(),el=document.getElementById('progressText');
  if(S.mode==='learn'){
    let m=0,t=0;learnData.forEach((c,ci)=>c.quiz.forEach((_,qi)=>{t++;if(p[`l_${ci}_${qi}`]==='m')m++}));
    el.textContent=`${m}/${t} 已掌握`;
  }else if(S.mode==='interview'){
    let m=0,t=0;interviewData.forEach((d,di)=>d.questions.forEach((_,qi)=>{t++;if(p[`i_${di}_${qi}`])m++}));
    el.textContent=`${m}/${t} 已练习`;
  }else{
    el.textContent='场景还原';
  }
}

/* ═══════════ LEARN MODE ═══════════ */
function renderLearn(app){
  const ch=learnData[S.ch],p=P();
  let sb='<div class="sidebar">';
  learnData.forEach((c,ci)=>{
    const tot=c.quiz.length;let m=0;
    c.quiz.forEach((_,qi)=>{if(p[`l_${ci}_${qi}`]==='m')m++});
    const pct=tot?Math.round(m/tot*100):0;
    const isOpen=ci===S.ch;
    sb+=`<div class="ch-group"><div class="ch-header ${isOpen?'open active':''}" onclick="S.ch=${ci};S.topic=0;S.sec=0;render()">
      <span class="ch-arrow">▶</span><span class="ch-title">${c.title}</span><span class="ch-badge">${m}/${tot}</span></div>
      <div class="ch-bar"><div class="ch-bar-fill" style="width:${pct}%"></div></div>
      <div class="ch-subs ${isOpen?'open':''}">`;
    c.topics.forEach((t,ti)=>{
      sb+=`<div class="sub-item ${isOpen&&ti===S.topic&&S.sec>=0?'active':''}" onclick="event.stopPropagation();S.ch=${ci};S.topic=${ti};S.sec=0;render()">${t.q.length>20?t.q.substring(0,20)+'...':t.q}</div>`;
    });
    sb+=`<div class="sub-item ${isOpen&&S.sec===-1?'active':''}" onclick="event.stopPropagation();S.ch=${ci};S.sec=-1;render()">📝 自检题</div>`;
    sb+='</div></div>';
  });
  sb+='</div>';

  let mn='<div class="main">';
  if(S.sec>=0){
    const topic=ch.topics[S.topic];
    mn+=`<div class="content-header"><h1>${ch.title}</h1><div class="subtitle">${topic.q}</div></div>`;
    mn+=`<div class="section-card"><h2>${topic.q}</h2>`;
    mn+=`<div class="lv-block lv1"><div class="lv-header" onclick="toggleLv(this)"><span class="lv-arrow">▶</span><span class="lv-tag">Lv1 概念</span><span style="flex:1;margin-left:8px">是什么、为什么</span></div><div class="lv-body">${topic.lv1}</div></div>`;
    mn+=`<div class="lv-block lv2"><div class="lv-header" onclick="toggleLv(this)"><span class="lv-arrow">▶</span><span class="lv-tag">Lv2 实现</span><span style="flex:1;margin-left:8px">项目里怎么做的</span></div><div class="lv-body">${topic.lv2}</div></div>`;
    mn+=`<div class="lv-block lv3"><div class="lv-header" onclick="toggleLv(this)"><span class="lv-arrow">▶</span><span class="lv-tag">Lv3 推演</span><span style="flex:1;margin-left:8px">如果...会怎样</span></div><div class="lv-body">${topic.lv3}</div></div>`;
    mn+='</div>';
    mn+='<div class="nav-bar">';
    if(S.topic>0)mn+=`<button class="nav-btn" onclick="S.topic--;S.sec=0;render();scrollMain()"><span class="arrow-icon">←</span> 上一个知识点</button>`;
    else mn+='<div></div>';
    if(S.topic<ch.topics.length-1)mn+=`<button class="nav-btn primary" onclick="S.topic++;S.sec=0;render();scrollMain()">下一个知识点 <span class="arrow-icon">→</span></button>`;
    else mn+=`<button class="nav-btn primary" onclick="S.sec=-1;render();scrollMain()">查看自检题 <span class="arrow-icon">→</span></button>`;
    mn+='</div>';
  }else{
    mn+=`<div class="content-header"><h1>${ch.title}</h1><div class="subtitle">自检题 — 检验你的理解</div></div>`;
    mn+='<div class="quiz-section">';
    ch.quiz.forEach((q,qi)=>{
      const st=p[`l_${S.ch}_${qi}`];
      const badge=st==='m'?'<span class="quiz-status status-mastered">已掌握</span>':st==='u'?'<span class="quiz-status status-unmastered">未掌握</span>':'';
      mn+=`<div class="quiz-item" style="animation-delay:${qi*50}ms"><div class="quiz-q" onclick="toggleQuiz(this)">
        <span class="q-num">${qi+1}</span><span class="q-text">${q.q}</span>${badge}<span class="q-toggle">▶</span></div>
        <div class="quiz-body"><div class="quiz-hint">${q.hint}</div>
        <div class="quiz-btns"><button class="quiz-btn mastered" onclick="event.stopPropagation();markL(${S.ch},${qi},'m')">✓ 已掌握</button>
        <button class="quiz-btn unmastered" onclick="event.stopPropagation();markL(${S.ch},${qi},'u')">✗ 未掌握</button></div></div></div>`;
    });
    mn+='</div>';
    mn+='<div class="nav-bar">';
    mn+=`<button class="nav-btn" onclick="S.sec=0;S.topic=${ch.topics.length-1};render();scrollMain()"><span class="arrow-icon">←</span> 返回知识点</button>`;
    if(S.ch<learnData.length-1)mn+=`<button class="nav-btn primary" onclick="S.ch++;S.topic=0;S.sec=0;render();scrollMain()">下一章 <span class="arrow-icon">→</span></button>`;
    else mn+='<div></div>';
    mn+='</div>';
  }
  mn+='</div>';
  app.innerHTML=sb+mn;
}

function toggleLv(el){const body=el.nextElementSibling;body.classList.toggle('open');el.classList.toggle('open')}
function scrollMain(){const m=document.querySelector('.main');if(m)m.scrollTop=0}
function toggleQuiz(el){const body=el.nextElementSibling;const arrow=el.querySelector('.q-toggle');body.classList.toggle('open');arrow.classList.toggle('open')}
function markL(ci,qi,st){const p=P();p[`l_${ci}_${qi}`]=st;save(p);render()}

  }
  mn+='</div>';
  app.innerHTML=sb+mn;
}

function markI(di,qi,st){const p=P();p[`i_${di}_${qi}`]=st;save(p);render()}
function randomQ(){const dim=interviewData[S.dim],p=P(),un=[];dim.questions.forEach((_,qi)=>{if(!p[`i_${S.dim}_${qi}`])un.push(qi)});if(!un.length){alert('该维度所有题目已练习完毕！');return}const idx=un[Math.floor(Math.random()*un.length)];const cards=document.querySelectorAll('.card');if(cards[idx]){cards[idx].scrollIntoView({behavior:'smooth',block:'center'});cards[idx].classList.add('flipped');cards[idx].style.outline='2px solid var(--accent)';cards[idx].style.outlineOffset='3px';setTimeout(()=>{cards[idx].style.outline='';cards[idx].style.outlineOffset=''},3000)}}
function toggleTimer(){if(S.running){clearInterval(S.timer);S.running=false;const b=document.getElementById('timerBtn');if(b){b.textContent='⏱ 开始计时';b.classList.remove('running')}}else{S.secs=0;S.running=true;const b=document.getElementById('timerBtn');if(b){b.textContent='⏹ 停止计时';b.classList.add('running')}S.timer=setInterval(()=>{S.secs++;const m=Math.floor(S.secs/60).toString().padStart(2,'0');const s=(S.secs%60).toString().padStart(2,'0');const d=document.getElementById('timerDisp');if(d)d.textContent=`${m}:${s}`},1000)}}
function filterAppendix(v){const rows=document.querySelectorAll('#appTable tbody tr');v=v.toLowerCase();rows.forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(v)?'':'none'})}

/* ═══════════ SCENARIO MODE ═══════════ */
function renderScenario(app){
  let sb='<div class="sidebar">';
  sb+=`<div class="dim-item active" onclick="S.sec=0;render()"><span>端到端流程</span><span class="dim-badge">${scenarioData.e2e.length}</span></div>`;
  sb+=`<div class="dim-item" onclick="S.sec=1;render()"><span>故障排查</span><span class="dim-badge">${scenarioData.fault.length}</span></div>`;
  sb+='</div>';

  let mn='<div class="main">';
  if(S.sec===0){
    mn+=`<div class="content-header"><h1>端到端场景还原</h1><div class="subtitle">追踪请求从入口到出口的完整链路</div></div>`;
    mn+='<div class="scenario-grid">';
    scenarioData.e2e.forEach((sc,si)=>{
      mn+=`<div class="scenario-card e2e" onclick="this.classList.toggle('open')" style="animation-delay:${si*60}ms">
        <h3><span class="sc-icon">→</span>${sc.title}</h3><p class="sc-desc">${sc.desc}</p><div class="sc-steps">`;
      sc.steps.forEach((st,sti)=>{
        mn+=`<div class="sc-step"><div class="sc-num">${sti+1}</div><div class="sc-step-content"><p><strong>${st.s}</strong></p><p class="sc-loc">${st.loc}</p>${st.detail?`<p style="font-size:12.5px;color:var(--fg3);margin-top:2px">${st.detail}</p>`:''}</div></div>`;
      });
      mn+='</div></div>';
    });
    mn+='</div>';
  }else{
    mn+=`<div class="content-header"><h1>故障排查场景</h1><div class="subtitle">当组件故障时系统如何响应</div></div>`;
    mn+='<div class="scenario-grid">';
    scenarioData.fault.forEach((sc,si)=>{
      mn+=`<div class="scenario-card fault" onclick="this.classList.toggle('open')" style="animation-delay:${si*60}ms">
        <h3><span class="sc-icon">⚠</span>${sc.title}</h3><p class="sc-desc">${sc.desc}</p><div class="sc-steps">`;
      sc.impacts.forEach(im=>{
        mn+=`<div class="fault-tree"><div class="ft-title">${im.what}</div><p>${im.detail}</p></div>`;
        mn+=`<div class="fix-box"><div class="fx-title">修复/降级</div><p>${im.fix}</p></div>`;
      });
      mn+='</div></div>';
    });
    mn+='</div>';
  }
  mn+='</div>';
  app.innerHTML=sb+mn;
}

/* ═══════════ SEARCH ═══════════ */
function renderSearch(app){
  const q=S.q,res=[];
  learnData.forEach((ch,ci)=>{
    ch.topics.forEach((t,ti)=>{
      const txt=t.q+t.lv1+t.lv2+t.lv3;
      if(txt.toLowerCase().includes(q))
        res.push({m:'learn',ci,ti,title:`${ch.title} > ${t.q}`,snip:strip(t.lv1).substring(0,120)});
    });
    ch.quiz.forEach((quiz,qi)=>{
      if(quiz.q.toLowerCase().includes(q)||quiz.hint.toLowerCase().includes(q))
        res.push({m:'learn',ci,ti:-1,title:`${ch.title} > 自检题 Q${qi+1}`,snip:quiz.q});
    });
  });
  interviewData.forEach((dim,di)=>{
    dim.questions.forEach((qu,qi)=>{
      if(qu.q.toLowerCase().includes(q)||qu.a.toLowerCase().includes(q))
        res.push({m:'interview',di,title:`${dim.dim} > Q${qi+1}`,snip:qu.q});
    });
  });
  scenarioData.e2e.forEach(sc=>{
    if(sc.title.toLowerCase().includes(q)||sc.desc.toLowerCase().includes(q))
      res.push({m:'scenario',sec:0,title:`端到端 > ${sc.title}`,snip:sc.desc});
  });
  scenarioData.fault.forEach(sc=>{
    if(sc.title.toLowerCase().includes(q)||sc.desc.toLowerCase().includes(q))
      res.push({m:'scenario',sec:1,title:`故障排查 > ${sc.title}`,snip:sc.desc});
  });
  appendixData.forEach(([k,v])=>{
    if(k.toLowerCase().includes(q)||v.toLowerCase().includes(q))
      res.push({m:'interview',di:interviewData.length-1,title:`追问速查表 > ${k}`,snip:v});
  });

  let h='<div class="sidebar"><div class="sidebar-empty">搜索模式<br><small>侧边栏已隐藏</small></div></div>';
  h+='<div class="main search-results">';
  h+=`<div class="content-header"><h1>搜索结果</h1><div class="subtitle">"${S.q}" — 找到 ${res.length} 条匹配</div></div>`;
  if(!res.length)h+='<p style="color:var(--fg3);text-align:center;padding:40px;">未找到匹配内容，换个关键词试试？</p>';
  res.forEach(r=>{
    h+=`<div class="search-result" onclick='jump(${JSON.stringify(r).replace(/'/g,"\\'")})'>
      <div class="sr-mode">${r.m==='learn'?'知识学习':r.m==='interview'?'面试模拟':'场景还原'}</div>
      <div class="sr-title">${hl(r.title,S.q)}</div>
      <div class="sr-snippet">${hl(r.snip,S.q)}</div></div>`;
  });
  h+='</div>';
  app.innerHTML=h;
}

function jump(r){
  S.q='';document.getElementById('searchInput').value='';
  if(r.m==='learn'){S.mode='learn';S.ch=r.ci;S.topic=Math.max(0,r.ti);S.sec=r.ti>=0?0:-1}
  else if(r.m==='interview'){S.mode='interview';S.dim=r.di}
  else{S.mode='scenario';S.sec=r.sec}
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===S.mode));
  render();
}

/* ═══════════ INIT ═══════════ */
setT(getT());
render();
</script>
</body>
